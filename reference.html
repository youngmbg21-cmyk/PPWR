  { term:'om',           type:'conjunction', short:'<strong>If / whether</strong> — subordinating, triggers BIFF. Same word as the preposition "about/in" — context tells you which.', en:'I don\'t know if she\'s home.', sv:'Jag vet inte om hon är hemma.' },
  { term:'som',          type:'conjunction', short:'<strong>That / who / which / as</strong> — relative pronoun used for everything English splits into who/which/that. Also means "as" in comparisons.', en:'the man that I saw', sv:'mannen som jag såg' },
  { term:'eftersom',     type:'conjunction', short:'<strong>Because</strong> — subordinating, triggers BIFF. <em>för att</em> is the alternative, slightly more common in speech.', en:'because I am tired', sv:'eftersom jag är trött' },
  { term:'innan',        type:'conjunction', short:'<strong>Before</strong> — subordinating, triggers BIFF. Distinct from the preposition <em>före</em> ("before [a noun]").', en:'before I leave', sv:'innan jag åker' },
  { term:'medan',        type:'conjunction', short:'<strong>While</strong> — subordinating, triggers BIFF. Indicates simultaneous action.', en:'while I cook', sv:'medan jag lagar mat' },

  // ── adverbs (time, place, intensity, frequency) ──
  // Time and place adverbs are the workhorses — they're also exactly
  // what triggers V2 inversion when fronted (Imorgon åker JAG…).
  { term:'idag',         type:'adverb', short:'<strong>Today</strong>. Time adverb — fronting it triggers V2 inversion.', en:'Today is Friday.', sv:'Idag är det fredag.' },
  { term:'imorgon',      type:'adverb', short:'<strong>Tomorrow</strong>. Time adverb — fronting it triggers V2 inversion.', en:'Tomorrow I work.', sv:'Imorgon arbetar jag.' },
  { term:'igår',         type:'adverb', short:'<strong>Yesterday</strong>. Time adverb — fronting it triggers V2 inversion.', en:'Yesterday I read a book.', sv:'Igår läste jag en bok.' },
  { term:'nu',           type:'adverb', short:'<strong>Now</strong>. Universal time marker.', en:'I am eating now.', sv:'Jag äter nu.' },
  { term:'sedan',        type:'adverb', short:'<strong>Then / afterwards / since</strong>. In speech, often shortened to "sen". Triple-duty word: time adverb, conjunction, AND preposition.', en:'first this, then that', sv:'först det här, sedan det' },
  { term:'här',          type:'adverb', short:'<strong>Here</strong>. Place adverb. Distinct from <em>hit</em> ("to here").', en:'I live here.', sv:'Jag bor här.' },
  { term:'där',          type:'adverb', short:'<strong>There</strong>. Place adverb. Distinct from <em>dit</em> ("to there").', en:'It\'s over there.', sv:'Det är där borta.' },
  { term:'hemma',        type:'adverb', short:'<strong>At home</strong>. Specifically "being at home" — distinct from <em>hem</em> (the noun "home") and <em>hem</em> (the directional adverb "homeward").', en:'I am at home.', sv:'Jag är hemma.' },
  { term:'inte',         type:'adverb', short:'<strong>Not</strong>. The Swedish negation. Position is rule-bound: AFTER the verb in main clauses, BEFORE the verb in subordinate clauses (BIFF).', en:'I don\'t know.', sv:'Jag vet inte.' },
  { term:'också',        type:'adverb', short:'<strong>Also / too</strong>. Common, sometimes shortened to "med" in casual speech ("jag med" = "me too").', en:'I also like coffee.', sv:'Jag tycker också om kaffe.' },
  { term:'kanske',       type:'adverb', short:'<strong>Maybe / perhaps</strong>. Sentence-modifying adverb — when it\'s first, it triggers V2 inversion just like time/place adverbs.', en:'Maybe she is at home.', sv:'Kanske är hon hemma.' },
  { term:'alltid',       type:'adverb', short:'<strong>Always</strong>. Frequency adverb. Goes after the verb in main clauses, before in subordinate clauses (same rule as <em>inte</em>).', en:'I always drink coffee.', sv:'Jag dricker alltid kaffe.' },
  { term:'aldrig',       type:'adverb', short:'<strong>Never</strong>. The strong negation, slot-equivalent to <em>inte</em>.', en:'I never lie.', sv:'Jag ljuger aldrig.' },

  // ── numbers (cardinal, the first ten + key larger ones) ──
  { term:'noll',         type:'number', short:'<strong>Zero</strong>. Used in temperatures, scores, addresses.', en:'zero degrees', sv:'noll grader' },
  { term:'ett',          type:'number', short:'<strong>One</strong>. Same word as the neuter article "ett" — context tells you which. The form <em>en</em> is also "one" (when modifying a common-gender noun).', en:'one apple', sv:'ett äpple' },
  { term:'två',          type:'number', short:'<strong>Two</strong>. No gender variation.', en:'two cats', sv:'två katter' },
  { term:'tre',          type:'number', short:'<strong>Three</strong>.', en:'three days', sv:'tre dagar' },
  { term:'fyra',         type:'number', short:'<strong>Four</strong>.', en:'four people', sv:'fyra personer' },
  { term:'fem',          type:'number', short:'<strong>Five</strong>.', en:'five o\'clock', sv:'klockan fem' },
  { term:'tio',          type:'number', short:'<strong>Ten</strong>. Above ten, the pattern is <em>elva (11), tolv (12), tretton (13)…</em>', en:'ten years', sv:'tio år' },
  { term:'tjugo',        type:'number', short:'<strong>Twenty</strong>. From here you build with -och-: <em>tjugoett (21), tjugotvå (22)</em>.', en:'twenty kronor', sv:'tjugo kronor' },
  { term:'hundra',       type:'number', short:'<strong>Hundred</strong>. <em>etthundra</em> for 100, <em>tvåhundra</em> for 200.', en:'a hundred kronor', sv:'hundra kronor' },
  { term:'tusen',        type:'number', short:'<strong>Thousand</strong>. <em>ettusen</em>, <em>tvåtusen</em>.', en:'a thousand', sv:'tusen' },

  // ── articles & determiners ──
  // Already touched in the grammar entries, but explicitly cataloged
  // here so a learner browsing "articles" finds them.
  { term:'en',           type:'article', short:'<strong>A / an</strong> for common-gender nouns ("en-words" — about 75% of nouns). Also means "one" as a number.', en:'a book', sv:'en bok' },
  { term:'ett',          type:'article', short:'<strong>A / an</strong> for neuter nouns ("ett-words" — about 25%). Also means "one" as a number.', en:'a house', sv:'ett hus' },
  { term:'den',          type:'article', short:'<strong>The</strong> — used in front of common-gender nouns ONLY when there\'s also an adjective (<em>den röda boken</em>). Without an adjective, definiteness is just a suffix (<em>boken</em>).', en:'the red book', sv:'den röda boken' },
  { term:'det',          type:'article', short:'<strong>The</strong> — neuter equivalent of <em>den</em>. Used with adjectives in front of ett-words (<em>det vita huset</em>).', en:'the white house', sv:'det vita huset' },
];

// Build the unified glossary entry list. Grammar terms (from TERMS)
// get type='grammar'; vocab items keep their declared type.
function getGlossaryEntries(){
  const grammar = Object.entries(TERMS).map(([key, v]) => ({
    key:'g:' + key,
    term:v.label,
    type:'grammar',
    short:v.short,
    en:v.en,
    sv:v.sv,
    sort: v.label.toLowerCase(),
  }));
  const vocab = VOCAB.map(v => ({
    key:'v:' + v.term,
    term:v.term,
    type:v.type,
    short:v.short,
    en:v.en,
    sv:v.sv,
    sort: v.term.replace(/^(att|en|ett)\s+/i, '').toLowerCase(),
  }));
  return [...grammar, ...vocab];
}

// Filter state — kept on _gl, not in localStorage; transient.
const _gl = { filter:'all', query:'' };

// Replace renderGlossary stub with the full glossary panel.
function renderGlossary(){
  const el = document.getElementById('panel-glossary');
  if(!el) return;
  const entries = getGlossaryEntries();
  const q = _gl.query.trim().toLowerCase();
  const filtered = entries.filter(e => {
    if(_gl.filter !== 'all' && e.type !== _gl.filter) return false;
    if(q){
      const hay = (e.term + ' ' + e.short + ' ' + (e.en||'') + ' ' + (e.sv||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  // Group by first letter for the A-Z layout. We use the `sort` field
  // (already lowercased and stripped of "att/en/ett") so "att vara"
  // appears under V, not A.
  filtered.sort((a,b) => a.sort.localeCompare(b.sort, 'sv'));
  const groups = {};
  filtered.forEach(e => {
    const letter = e.sort.charAt(0).toUpperCase() || '#';
    (groups[letter] = groups[letter] || []).push(e);
  });
  const filters = [
    {id:'all',          label:'All',          count: entries.length},
    {id:'grammar',      label:'Grammar',      count: entries.filter(e => e.type === 'grammar').length},
    {id:'verb',         label:'Verbs',        count: entries.filter(e => e.type === 'verb').length},
    {id:'noun',         label:'Nouns',        count: entries.filter(e => e.type === 'noun').length},
    {id:'pronoun',      label:'Pronouns',     count: entries.filter(e => e.type === 'pronoun').length},
    {id:'adjective',    label:'Adjectives',   count: entries.filter(e => e.type === 'adjective').length},
    {id:'adverb',       label:'Adverbs',      count: entries.filter(e => e.type === 'adverb').length},
    {id:'preposition',  label:'Prepositions', count: entries.filter(e => e.type === 'preposition').length},
    {id:'conjunction',  label:'Conjunctions', count: entries.filter(e => e.type === 'conjunction').length},
    {id:'number',       label:'Numbers',      count: entries.filter(e => e.type === 'number').length},
    {id:'article',      label:'Articles',     count: entries.filter(e => e.type === 'article').length},
    {id:'phrase',       label:'Phrases',      count: entries.filter(e => e.type === 'phrase').length},
  ];
  const pills = filters.map(f =>
    `<button class="gl-pill ${_gl.filter === f.id ? 'active' : ''}" onclick="glSetFilter('${f.id}')">${esc(f.label)}</button>`
  ).join('');

  let body = '';
  const letters = Object.keys(groups).sort((a,b) => a.localeCompare(b, 'sv'));
  if(!letters.length){
    body = `<div class="gl-empty">No matches for <em>"${esc(_gl.query)}"</em>. Try a different search or filter.</div>`;
  } else {
    body = letters.map(L => `
      <div class="gl-letter-group">
        <div class="gl-letter-h">${esc(L)}</div>
        <div class="gl-grid">
          ${groups[L].map(e => `
            <div class="gl-entry type-${esc(e.type)}">
              <div class="gl-entry-head">
                <div class="gl-entry-term">${esc(e.term)}</div>
                <div class="gl-entry-tag">${esc(e.type)}</div>
              </div>
              <div class="gl-entry-short">${e.short}</div>
              ${e.en ? `<div class="gl-entry-pair gl-entry-pair-en"><span class="gl-entry-pair-tag">EN</span><div>${e.en}</div></div>` : ''}
              ${e.sv ? `<div class="gl-entry-pair gl-entry-pair-sv"><span class="gl-entry-pair-tag">SV</span><div>${e.sv}</div></div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  el.innerHTML = `
    ${decorateBreadcrumb('glossary')}
    <div class="ph">
      <div class="ph-tag">Ordklasser · Word classes & vocabulary</div>
      <div class="ph-title">Glossary</div>
      <div class="ph-sub">Searchable reference combining the grammar terms used throughout this app with high-frequency Swedish vocabulary. Filter by type or search by word — works in both English and Swedish.</div>
    </div>
    <div class="gl-toolbar">
      <div class="gl-search-wrap">
        <span class="gl-search-icon">🔍</span>
        <input class="gl-search" id="gl-search-input" placeholder="Search… (try 'verb', 'fika', or 'V2')"
          value="${esc(_gl.query)}"
          oninput="glSetQuery(this.value)">
      </div>
      <div class="gl-pills">${pills}</div>
      <span class="gl-count">${filtered.length} ${filtered.length === 1 ? 'entry' : 'entries'}</span>
    </div>
    ${body}
  `;
  // Restore focus to the search input if the user was typing — without
  // this the re-render would steal focus on every keystroke.
  if(_gl.query){
    const inp = document.getElementById('gl-search-input');
    if(inp){
      inp.focus();
      inp.setSelectionRange(_gl.query.length, _gl.query.length);
    }
  }
}

function glSetFilter(f){ _gl.filter = f; renderGlossary(); }
function glSetQuery(q){ _gl.query = q; renderGlossary(); }

// AI TUTOR — the chat itself
// ═══════════════════════════════════════════════════════════════
// The Tutor reads context from the app: which panel the user is on,
// which lesson is open, what tier they're on, and which grammar
// topics they've shown progress on. That context becomes part of the
// system prompt so Claude can answer in a way that's calibrated to
// the user's level and current focus.

const AI_MODEL = 'claude-sonnet-4-20250514';

// Session message history. Persisted in state.aiMessages so a refresh
// keeps the conversation. Capped at 30 messages to stay polite to the
// API context window.
function aiHistory(){
  if(!Array.isArray(state.aiMessages)) state.aiMessages = [];
  return state.aiMessages;
}

function aiOpen(){
  const panel = document.getElementById('ai-panel');
  const back  = document.getElementById('ai-backdrop');
  const fab   = document.getElementById('ai-fab');
  const fabIcon = document.getElementById('ai-fab-icon');
  if(!panel) return;
  panel.classList.add('open');
  back.classList.add('show');
  fab.classList.add('is-open');
  fabIcon.textContent = '✕';
  renderAi();
  // Focus the input on next frame.
  setTimeout(() => {
    const i = document.getElementById('ai-input');
    if(i) i.focus();
  }, 280);
}

function aiClose(){
  const panel = document.getElementById('ai-panel');
  const back  = document.getElementById('ai-backdrop');
  const fab   = document.getElementById('ai-fab');
  const fabIcon = document.getElementById('ai-fab-icon');
  if(!panel) return;
  panel.classList.remove('open');
  back.classList.remove('show');
  fab.classList.remove('is-open');
  if(fabIcon) fabIcon.textContent = '+';
}

function aiToggle(){
  const open = document.getElementById('ai-panel').classList.contains('open');
  if(open) aiClose(); else aiOpen();
}

function aiClearHistory(){
  if(!confirm('Clear all AI Tutor messages from this session?')) return;
  state.aiMessages = [];
  save();
  renderAi();
  if(state.activePanel === 'settings') renderSettings();
}

// Render the conversation panel — switches between the no-key state,
// the empty-conversation state, and the active-conversation state.
function renderAi(){
  const body = document.getElementById('ai-body');
  const foot = document.getElementById('ai-foot');
  if(!body || !foot) return;
  if(!state.aiKey){
    body.innerHTML = renderAiKeyState();
    foot.innerHTML = '';
    // Hook up the entry input handler.
    const inp = document.getElementById('ai-keystate-input');
    if(inp){
      inp.addEventListener('keydown', (e) => {
        if(e.key === 'Enter'){
          state.aiKey = inp.value.trim();
          save();
          renderAi();
        }
      });
    }
    return;
  }
  const history = aiHistory();
  if(history.length === 0){
    body.innerHTML = renderAiWelcome();
  } else {
    body.innerHTML = history.map(m => renderAiMsg(m)).join('') +
      (_aiPending ? `<div class="ai-typing"><span></span><span></span><span></span></div>` : '');
    // Auto-scroll to bottom.
    body.scrollTop = body.scrollHeight;
  }
  foot.innerHTML = renderAiFoot();
  const inp = document.getElementById('ai-input');
  if(inp){
    inp.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        aiSend();
      }
    });
    // Auto-grow.
    inp.addEventListener('input', () => {
      inp.style.height = 'auto';
      inp.style.height = Math.min(160, inp.scrollHeight) + 'px';
    });
  }
}

// Lightweight markdown → HTML for the assistant's reply. Keeps things
// safe by escaping first, then replacing markdown patterns. Handles
// code blocks (```), inline code (`), bold (**), italics (*), bullet
// lists (- or *), and paragraph breaks.
function formatAiMarkdown(text){
  if(!text) return '';
  // 1. Escape first.
  let s = esc(text);
  // 2. Code fences. Triple-backtick blocks become <pre><code>.
  s = s.replace(/```([\s\S]*?)```/g, (m, code) => `<pre>${code.trim()}</pre>`);
  // 3. Inline code.
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // 4. Bold and italics.
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  // 5. Bullet lists. Lines starting with "- " or "* " grouped.
  const lines = s.split('\n');
  let out = []; let inList = false;
  for(let i = 0; i < lines.length; i++){
    const ln = lines[i];
    if(/^\s*[-*]\s+/.test(ln)){
      if(!inList){ out.push('<ul>'); inList = true; }
      out.push('<li>' + ln.replace(/^\s*[-*]\s+/, '') + '</li>');
    } else if(/^\s*\d+\.\s+/.test(ln)){
      if(inList){ out.push('</ul>'); inList = false; }
      // Numbered items — fold into <ol>. Simpler approach: use <p>.
      out.push('<p>' + ln + '</p>');
    } else {
      if(inList){ out.push('</ul>'); inList = false; }
      if(ln.trim()) out.push('<p>' + ln + '</p>');
    }
  }
  if(inList) out.push('</ul>');
  return out.join('');
}

// Ask the Tutor a specific suggested question — wires up the input
// then triggers send.
function aiSendPrompt(text){
  // Render once with the welcome cleared by writing to history first.
  if(!Array.isArray(state.aiMessages)) state.aiMessages = [];
  // Insert into the textarea so the user sees the question being sent.
  const inp = document.getElementById('ai-input');
  // The welcome state has no input; render the chat shell first.
  if(!inp){
    aiHistory().push({ role:'user', content:text, when:Date.now() });
    save();
    renderAi();
    aiCallApi();
    return;
  }
  inp.value = text;
  aiSend();
}

// Send the current input to the API.
let _aiPending = false;
async function aiSend(){
  if(_aiPending) return;
  const inp = document.getElementById('ai-input');
  const text = (inp ? inp.value : '').trim();
  if(!text) return;
  if(inp){ inp.value = ''; inp.style.height = 'auto'; }
  aiHistory().push({ role:'user', content:text, when:Date.now() });
  save();
  renderAi();
  await aiCallApi();
}

// Build the system prompt with rich app context.
function aiSystemPrompt(){
  const tier = state.tier || 'conversational';
  const panelMeta = PANEL_META[state.activePanel] || {};
  let context = `You are a Swedish-language tutor for native English speakers. The student is using SVENSKA, an interactive learning app.

CURRENT CONTEXT:
- Active panel: ${panelMeta.label || state.activePanel}
- Tier (target register): ${tier}
- Streak: ${state.streakDays || 0} days
- Lessons completed: ${Object.keys(state.completedLessons || {}).length}`;

  // If a lesson is open, include its content.
  if(state.openLesson){
    const t = findTrack(state.openLesson.trackId);
    const u = t && findUnit(t, state.openLesson.unitId);
    if(t && u){
      const variant = u.byTier[tier] || u.byTier.conversational || Object.values(u.byTier)[0];
      context += `
- Current lesson: ${t.name} → ${u.name}
- Lesson focus: ${variant.explain ? variant.explain.slice(0, 200) : ''}`;
    }
  }
  // If a grammar topic is open and panel is Grammar, include it.
  if(state.activePanel === 'grammar' && state.openGrammar){
    const topic = findGrammarTopic(state.openGrammar);
    if(topic){
      context += `
- Open grammar topic: ${topic.titleEn} (${topic.titleSv})
- Topic focus: ${topic.eyebrow}`;
    }
  }

  context += `

TEACHING APPROACH:
- Always relate Swedish back to English. The student's instinct is English; honor it as a starting point.
- When Swedish diverges (V2 word order, en/ett gender, definite suffix, BIFF, pitch accent), make the contrast explicit.
- Keep examples concrete with full Swedish + English pairs.
- Use markdown: **bold** for key terms, *italics* for Swedish words, \`code\` for IPA, bullet points for lists.
- Use emojis sparingly: only 🎯 (V2), 🔊 (sounds), ⚖ (gender), ⛔ (BIFF) when they aid clarity.
- If the student is "conversational" tier, prioritize spoken / everyday register. If "professional", prioritize work / email register. If "written", include formal vocabulary.
- Be concise. Aim for under 200 words per response unless the student asks for depth.
- If you're not certain about a word's gender or pitch accent, say so rather than guessing.`;

  return context;
}

async function aiCallApi(){
  if(!state.aiKey){
    aiHistory().push({ role:'error', content:'No API key set. Add one in Settings.', when:Date.now() });
    save();
    renderAi();
    return;
  }
  _aiPending = true;
  renderAi();

  // Prepare messages: only role:user / role:assistant, in order.
  const trimmed = aiHistory()
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .slice(-30)
    .map(m => ({ role:m.role, content:m.content }));

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':state.aiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({
        model:AI_MODEL,
        max_tokens:1024,
        system:aiSystemPrompt(),
        messages:trimmed,
      }),
    });
    if(!resp.ok){
      const errText = await resp.text();
      let detail = errText;
      try { detail = JSON.parse(errText).error?.message || errText; } catch(e){}
      aiHistory().push({ role:'error', content:`API error (${resp.status}): ${detail}`, when:Date.now() });
    } else {
      const data = await resp.json();
      // Concatenate all text blocks (responses can be a mix of text +
      // tool_use; here we only use text).
      const text = (data.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n');
      aiHistory().push({ role:'assistant', content:text || '(empty response)', when:Date.now() });
    }
  } catch(e){
    aiHistory().push({ role:'error', content:'Network error: ' + e.message, when:Date.now() });
  }
  _aiPending = false;
  // Cap history.
  if(aiHistory().length > 30) state.aiMessages = aiHistory().slice(-30);
  save();
  renderAi();
}



// ─── EXPORT / IMPORT ───────────────────────────────────────────────────────
function exportState(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'svenska-backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function importState(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const d = JSON.parse(e.target.result);
      Object.assign(state, d);
      save();
      applyTheme();
      setTier(state.tier);
      nav(state.activePanel);
      alert('Backup imported.');
    } catch(err){ alert('Invalid backup file: ' + err.message); }
    input.value = '';
  };
  reader.readAsText(file);
}

// ─── COMMAND PALETTE ───────────────────────────────────────────────────────
let _cmdpItems = [];
let _cmdpIdx = 0;

function buildCmdpItems(){
  const items = [];
  // Panels
  VALID_PANELS.forEach(p => {
    const m = PANEL_META[p];
    items.push({
      group:'Go to', icon:m.icon, label:m.label, hint:m.group,
      keywords:`${m.label} ${m.group} ${p}`.toLowerCase(),
      action:() => nav(p),
    });
  });
  // Grammar Compass topics — direct deep-link.
  if(typeof GRAMMAR_TOPICS !== 'undefined'){
    GRAMMAR_TOPICS.forEach(t => {
      items.push({
        group:'Grammar', icon:t.icon, label:t.titleEn, hint:t.titleSv,
        keywords:`${t.titleEn} ${t.titleSv} ${t.id} ${t.eyebrow || ''}`.toLowerCase(),
        action:() => openGrammar(t.id),
      });
    });
  }
  // Lessons — every track + first unit.
  if(typeof TRACKS !== 'undefined'){
    TRACKS.forEach(t => {
      items.push({
        group:'Lessons', icon:t.icon, label:t.name, hint:t.nameSv,
        keywords:`${t.name} ${t.nameSv} ${t.id}`.toLowerCase(),
        action:() => openLesson(t.id, t.units[0].id),
      });
    });
  }
  // Tier
  ['conversational','professional','written'].forEach(t => {
    items.push({
      group:'Tier', icon:'🎚', label:`Switch to ${t}`, hint:'',
      keywords:`tier ${t} switch level`.toLowerCase(),
      action:() => setTier(t),
    });
  });
  // Theme
  items.push({
    group:'Action', icon:'☾', label:'Toggle theme (dark/light)', hint:'',
    keywords:'theme dark light toggle',
    action:() => toggleTheme(),
  });
  // AI Tutor
  items.push({
    group:'Action', icon:'A', label:'Open AI Tutor', hint:'⌥A',
    keywords:'ai tutor chat assistant claude help ask',
    action:() => aiOpen(),
  });
  return items;
}
function cmdpFilter(q){
  const all = buildCmdpItems();
  const qq = (q || '').trim().toLowerCase();
  if(!qq) return all;
  const tokens = qq.split(/\s+/).filter(Boolean);
  return all.map(it => {
    let score = 0;
    const lab = it.label.toLowerCase();
    tokens.forEach(t => {
      if(lab.startsWith(t)) score += 12;
      else if(lab.includes(t)) score += 6;
      else if(it.keywords.includes(t)) score += 3;
      else score -= 100;
    });
    return { it, score };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score).map(x => x.it);
}
function renderCmdpResults(){
  const el = document.getElementById('cmdp-results');
  if(!el) return;
  if(!_cmdpItems.length){
    el.innerHTML = `<div class="cmdp-empty">No matches. Try "grammar", "pronunciation", or "tier".</div>`;
    return;
  }
  const groups = {};
  const order = [];
  _cmdpItems.forEach((it, idx) => {
    if(!groups[it.group]){ groups[it.group] = []; order.push(it.group); }
    groups[it.group].push({ it, idx });
  });
  el.innerHTML = order.map(g => `
    <div class="cmdp-group">${esc(g)}</div>
    ${groups[g].map(({it, idx}) => `
      <div class="cmdp-item ${idx === _cmdpIdx ? 'active' : ''}" data-idx="${idx}" onclick="cmdpRun(${idx})" onmouseenter="cmdpSelect(${idx})">
        <span class="cmdp-item-icon">${it.icon || '•'}</span>
        <span class="cmdp-item-label">${esc(it.label)}</span>
        ${it.hint ? `<span class="cmdp-item-hint">${esc(it.hint)}</span>` : ''}
      </div>
    `).join('')}
  `).join('');
  const active = el.querySelector('.cmdp-item.active');
  if(active) active.scrollIntoView({block:'nearest'});
}
function cmdpSelect(idx){
  if(!_cmdpItems.length) return;
  _cmdpIdx = Math.max(0, Math.min(_cmdpItems.length - 1, idx));
  document.querySelectorAll('.cmdp-item').forEach(el => {
    el.classList.toggle('active', +el.getAttribute('data-idx') === _cmdpIdx);
  });
}
function cmdpRun(idx){
  const it = _cmdpItems[idx]; if(!it) return;
  cmdpClose();
  try { it.action(); } catch(e){ console.warn(e); }
}
function cmdpOpen(){
  const panel = document.getElementById('cmdp');
  const bd = document.getElementById('cmdp-backdrop');
  const inp = document.getElementById('cmdp-input');
  if(!panel || !inp) return;
  panel.classList.add('open');
  bd.classList.add('open');
  inp.value = ''; _cmdpIdx = 0;
  _cmdpItems = cmdpFilter('');
  renderCmdpResults();
  setTimeout(() => inp.focus(), 30);
}
function cmdpClose(){
  document.getElementById('cmdp')?.classList.remove('open');
  document.getElementById('cmdp-backdrop')?.classList.remove('open');
}
function cmdpIsOpen(){ return document.getElementById('cmdp')?.classList.contains('open'); }

window.addEventListener('keydown', (e) => {
  const meta = e.metaKey || e.ctrlKey;
  if(meta && (e.key === 'k' || e.key === 'K')){
    e.preventDefault();
    cmdpIsOpen() ? cmdpClose() : cmdpOpen();
    return;
  }
  // ⌥A / Alt+A toggles the AI Tutor panel from anywhere.
  if(e.altKey && (e.key === 'a' || e.key === 'A' || e.key === 'å')){
    e.preventDefault();
    aiToggle();
    return;
  }
  // Esc closes whichever overlay is open (cmdp first, then AI panel).
  if(e.key === 'Escape'){
    if(cmdpIsOpen()){ e.preventDefault(); cmdpClose(); return; }
    if(document.getElementById('ai-panel') && document.getElementById('ai-panel').classList.contains('open')){
      e.preventDefault(); aiClose(); return;
    }
  }
  if(!cmdpIsOpen()) return;
  if(e.key === 'ArrowDown'){ e.preventDefault(); cmdpSelect(_cmdpIdx + 1); return; }
  if(e.key === 'ArrowUp'){ e.preventDefault(); cmdpSelect(_cmdpIdx - 1); return; }
  if(e.key === 'Enter'){ e.preventDefault(); cmdpRun(_cmdpIdx); return; }
});
document.getElementById('cmdp-input').addEventListener('input', (e) => {
  _cmdpItems = cmdpFilter(e.target.value);
  _cmdpIdx = 0;
  renderCmdpResults();
});

// ─── STREAK BOOKKEEPING ────────────────────────────────────────────────────
// Bumps the streak counter at most once per day. Resets to 1 if a day
// was skipped. Called once on init.
function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  const last = state.lastVisitISO ? state.lastVisitISO.slice(0,10) : null;
  if(last === today) return; // already counted today
  if(last){
    const d1 = new Date(last);
    const d2 = new Date(today);
    const diff = Math.round((d2 - d1) / 86400000);
    if(diff === 1) state.streakDays = (state.streakDays || 0) + 1;
    else state.streakDays = 1;
  } else {
    state.streakDays = 1;
  }
  state.lastVisitISO = new Date().toISOString();
  const sb = document.getElementById('sb-streak');
  if(sb) sb.innerHTML = `${state.streakDays} <span style="font-size:13px;font-weight:400;color:var(--text2);font-family:var(--ff-body);font-style:italic">day${state.streakDays===1?'':'s'}</span>`;
  save();
}
