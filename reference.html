}

// ─── ACTIVE SESSION RENDER ─────────────────────────────────────────────
function renderPracticeSession(){
  // AUTO-REFILL state — we ran out of queued items but the user has
  // auto-fresh enabled, so we're generating more in the background.
  if(_autoRefilling){
    const batchSize = state.autoFreshBatchSize || 5;
    const reviewed = _sess.metrics.reviewed;
    const correctPct = reviewed > 0 ? Math.round((_sess.metrics.correct / reviewed) * 100) : 0;
    return `
      <div class="pr-session-head">
        <div class="pr-progress"><div class="pr-progress-fill" style="width:100%;background:linear-gradient(90deg,var(--gold),var(--plum))"></div></div>
        <div class="pr-progress-meta">${reviewed} done · ${correctPct}% correct · refilling…</div>
        <button class="pr-quit-btn" onclick="quitSessionFromRefill()">End session</button>
      </div>
      <div class="pr-card mode-fresh">
        <div class="pr-mode-tag is-generated"><span class="pr-mode-dot"></span>auto-fresh</div>
        <div class="pr-fresh-loading" style="text-align:center;padding:40px 20px">
          <div class="ai-typing" style="margin:0 auto 14px"><span></span><span></span><span></span></div>
          <div style="font-family:var(--ff-display);font-size:18px;color:var(--text);margin-bottom:6px">Composing ${batchSize} new sentences…</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.5">Keeping the queue going. Tailored to the patterns you've been weak on.</div>
        </div>
      </div>
    `;
  }
  // Loading state for AI generation (manual button).
  if(_sess.mode === 'fresh-loading' || _freshLoading){
    return `
      <div class="pr-session-head">
        <div class="pr-progress"><div class="pr-progress-fill" style="width:0%"></div></div>
        <div class="pr-progress-meta">Generating fresh item…</div>
        <button class="pr-quit-btn" onclick="quitSession()">End session</button>
      </div>
      <div class="pr-card mode-fresh">
        <div class="pr-mode-tag is-generated"><span class="pr-mode-dot"></span>fresh mode</div>
        <div class="pr-fresh-loading">
          <div class="ai-typing"><span></span><span></span><span></span></div>
          <span>Composing a fresh sentence for you…</span>
        </div>
      </div>
    `;
  }
  if(_freshError){
    return `
      <div class="pr-session-head">
        <button class="pr-quit-btn" onclick="quitSession()" style="margin-left:auto">End session</button>
      </div>
      <div class="pr-card mode-fresh">
        <div class="pr-mode-tag is-generated"><span class="pr-mode-dot"></span>fresh mode</div>
        <div class="ai-msg error" style="margin-top:14px"><strong>Couldn't generate.</strong> ${esc(_freshError)}<br><br>Make sure your AI Tutor key is set in Settings.</div>
        <div class="pr-submit"><button class="btn btn-primary" onclick="generateFreshItem()">Try again</button> <button class="btn btn-ghost" onclick="quitSession()">End session</button></div>
      </div>
    `;
  }
  const item = _sess.item;
  if(!item) return '';
  const i = _sess.cursor + 1;
  const total = _sess.queue.length;
  const pct = Math.round((_sess.cursor / total) * 100);
  // Body changes per-mode.
  let body = '';
  if(_sess.mode === 'recall')        body = renderModeRecall(item);
  else if(_sess.mode === 'recognize')body = renderModeRecognize(item);
  else if(_sess.mode === 'listen')   body = renderModeListen(item);
  else if(_sess.mode === 'build')    body = renderModeBuild(item);

  const isGen = item.generated;
  const freshMeta = isGen ? `
    <div class="pr-fresh-meta">
      <strong>Generated by AI</strong> · pattern focus: ${esc(item.generatedPattern || 'general')} · tier: ${esc(item.tier)}.
      This is a fresh sentence created for you to practice on. It enters your normal SM-2 schedule and will resurface like any other item.
    </div>
  ` : '';

  return `
    <div class="pr-session-head">
      <div class="pr-progress"><div class="pr-progress-fill" style="width:${pct}%"></div></div>
      <div class="pr-progress-meta"><strong>${i}</strong> / ${total} · ${_sess.metrics.correct}/${_sess.metrics.reviewed} correct${_sess.metrics.bestStreak > 1 ? ` · 🔥${_sess.metrics.streak}` : ''}</div>
      <button class="pr-quit-btn" onclick="quitSession()">End session</button>
    </div>
    <div class="pr-card mode-${esc(_sess.mode)}">
      <div class="pr-mode-tag ${isGen ? 'is-generated' : ''}"><span class="pr-mode-dot"></span>${esc(_sess.mode)} mode</div>
      <div class="pr-context">
        <span class="pr-context-tag">${esc(item.unitEyebrow)} · ${esc(item.unitName)}</span>
        <span class="pr-context-tag">${esc(item.tier)}</span>
      </div>
      ${freshMeta}
      ${body}
    </div>
  `;
}

// MODE: recall — show EN, type SV.
function renderModeRecall(item){
  const checked = _sess.recallChecked;
  const correct = _sess.recallCorrect;
  const inputCls = checked ? (correct ? 'correct' : 'wrong') : '';
  const reveal = checked ? `
    <div class="pr-reveal">
      <div class="pr-reveal-h">${correct ? 'Right — that\'s it' : 'Reference answer'}</div>
      <div class="pr-reveal-sv">${esc(item.sv)}</div>
      <div class="pr-reveal-en">${esc(item.en)}</div>
      ${item.note ? `<div class="pr-reveal-note">${item.note}</div>` : ''}
    </div>
  ` : '';
  const action = !checked ? `
    <div class="pr-submit">
      <button class="btn btn-primary" onclick="recallSubmit()">Check answer</button>
      <button class="btn btn-ghost" onclick="recallSkip()">I don't know</button>
    </div>
  ` : renderGradeButtons(correct);
  return `
    <div class="pr-prompt">${esc(item.en)}</div>
    <div class="pr-prompt-hint">Type the Swedish translation. Punctuation and capitals don't count.</div>
    <input type="text" class="pr-input ${inputCls}" id="pr-recall-input"
      value="${esc(_sess.recallInput)}"
      placeholder="Type in Swedish…"
      ${checked ? 'disabled' : ''}
      autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    ${reveal}
    ${action}
  `;
}
function recallSkip(){
  _sess.recallChecked = true;
  _sess.recallCorrect = false;
  _sess.recallInput = '';
  renderPractice();
}

// MODE: recognize — show SV, pick EN from 4 options.
function renderModeRecognize(item){
  const picked = _sess.optionPicked;
  const optsHtml = _sess.options.map((opt, i) => {
    let cls = 'pr-option';
    if(picked != null){
      if(opt === item.en) cls += ' correct';
      else if(picked === i) cls += ' wrong';
      else cls += ' dim';
    }
    return `<button class="${cls}" onclick="pickOption(${i})" ${picked != null ? 'disabled' : ''}>${esc(opt)}</button>`;
  }).join('');
  const reveal = picked != null ? `
    ${item.note ? `<div class="pr-reveal"><div class="pr-reveal-h">Note</div><div class="pr-reveal-en">${item.note}</div></div>` : ''}
  ` : '';
  const correct = picked != null && _sess.options[picked] === item.en;
  return `
    <div class="pr-prompt">${esc(item.sv)}</div>
    <div class="pr-prompt-hint">Pick the English meaning.</div>
    <div class="pr-options">${optsHtml}</div>
    ${reveal}
    ${picked != null ? renderGradeButtons(correct) : ''}
  `;
}

// MODE: listen — TTS plays SV, user picks EN from 4 options.
function renderModeListen(item){
  const picked = _sess.optionPicked;
  const optsHtml = _sess.options.map((opt, i) => {
    let cls = 'pr-option';
    if(picked != null){
      if(opt === item.en) cls += ' correct';
      else if(picked === i) cls += ' wrong';
      else cls += ' dim';
    }
    return `<button class="${cls}" onclick="pickOption(${i})" ${picked != null ? 'disabled' : ''}>${esc(opt)}</button>`;
  }).join('');
  const correct = picked != null && _sess.options[picked] === item.en;
  return `
    <div class="pr-prompt-hint" style="margin-bottom:14px;font-style:normal;color:var(--text2);font-size:14px">Listen carefully, then pick the English meaning.</div>
    <button class="pr-play-big" id="pr-play-big" onclick="speak('${esc(item.sv).replace(/'/g, "\\'")}', {btn:this})">
      <span class="pr-play-big-icon">▶</span>
      <span>Play Swedish</span>
    </button>
    <div class="pr-options">${optsHtml}</div>
    ${picked != null ? `
      <div class="pr-reveal">
        <div class="pr-reveal-h">Reference</div>
        <div class="pr-reveal-sv">${esc(item.sv)}</div>
        ${item.note ? `<div class="pr-reveal-note">${item.note}</div>` : ''}
      </div>
    ` : ''}
    ${picked != null ? renderGradeButtons(correct) : ''}
  `;
}

// MODE: build — tile-based assembly.
function renderModeBuild(item){
  const slotsHtml = _sess.build.slots.map((bankIdx, slotI) => {
    const correctTok = item.tokens[slotI];
    let cls = 'sb-slot';
    let inner;
    if(bankIdx == null){
      cls += ' empty';
      inner = `<span class="sb-slot-empty-text">slot ${slotI + 1}</span>`;
    } else {
      cls += ' filled';
      const tile = _sess.build.bank[bankIdx];
      if(_sess.build.checked){
        if(tile.originalIdx === slotI) cls += ' correct';
        else cls += ' wrong';
      }
      inner = `<span class="sb-slot-word">${esc(tile.word)}</span>
               <span class="sb-slot-role">${esc(correctTok.role)}</span>`;
    }
    return `<div class="${cls}" onclick="bReturn(${slotI})">
      <span class="sb-slot-num">slot ${slotI + 1}</span>
      ${inner}
    </div>`;
  }).join('');
  const bankHtml = _sess.build.bank.map((t, i) => `
    <button class="sb-tile ${t.used ? 'used' : ''}" onclick="bPlace(${i})">${esc(t.word)}</button>
  `).join('');
  const checked = _sess.build.checked;
  const correct = _sess.build.correct;
  return `
    <div class="pr-prompt">${esc(item.en)}</div>
    <div class="pr-prompt-hint">Tap word tiles to assemble the Swedish translation.</div>
    <div class="pr-build-target">
      <div class="pr-build-slots">${slotsHtml}</div>
    </div>
    <div class="pr-build-bank">${bankHtml}</div>
    ${!checked ? `
      <div class="pr-submit">
        <button class="btn btn-primary" onclick="bCheck()">Check answer</button>
      </div>
    ` : ''}
    ${checked ? `
      <div class="pr-reveal">
        <div class="pr-reveal-h">${correct ? 'Right — that\'s it' : 'Reference answer'}</div>
        <div class="pr-reveal-sv">${esc(item.sv)}</div>
        ${item.note ? `<div class="pr-reveal-note">${item.note}</div>` : ''}
      </div>
    ` : ''}
    ${checked ? renderGradeButtons(correct) : ''}
  `;
}

// Grading buttons, with predicted next-interval previews. The previews
// are computed against the item's current SM-2 state — so the user can
// see "if I press Good, this comes back in ~12 days".
function renderGradeButtons(answeredCorrectly){
  const rec = getMastery(_sess.item.id);
  const labels = {
    wrong: 'Wrong',
    hard:  'Hard',
    good:  'Good',
    easy:  'Easy',
  };
  // Compute previews — pure function so no state mutation.
  const preview = (score) => {
    const r = sm2Update(rec, scoreToQuality(score));
    if(r.interval === 0) return '<10 min';
    if(r.interval === 1) return '1 day';
    if(r.interval < 30) return r.interval + ' days';
    if(r.interval < 365) return Math.round(r.interval / 30) + ' mo';
    return '1 yr+';
  };
  // If the user got it wrong on the auto-graded modes (recognize, listen,
  // build), default-suggest "Wrong" by accenting it more visibly.
  const order = ['wrong', 'hard', 'good', 'easy'];
  return `
    <div class="pr-grade">
      ${order.map(s => `
        <button class="pr-grade-btn ${s}" onclick="gradeItem('${s}')">
          <span>${labels[s]}</span>
          <span class="pr-grade-interval">${preview(s)}</span>
        </button>
      `).join('')}
    </div>
  `;
}

// ─── END-OF-SESSION SUMMARY ───────────────────────────────────────────
function renderPracticeSummary(){
  const m = _sess.metrics;
  const elapsedMin = Math.max(1, Math.round((Date.now() - m.startedAt) / 60000));
  const pct = m.reviewed > 0 ? Math.round((m.correct / m.reviewed) * 100) : 0;
  const nextDue = itemsDue().length;
  // Pick an icon + headline based on score.
  let icon = '✦', head = `Session <em>complete</em>`, sub = `${m.reviewed} item${m.reviewed === 1 ? '' : 's'} reviewed in ${elapsedMin} min.`;
  if(pct >= 90)      { icon = '🌟'; head = `<em>Excellent</em> session`; }
  else if(pct >= 75) { icon = '✦';  head = `Solid <em>session</em>`; }
  else if(pct >= 50) { icon = '◐';  head = `Decent run`; sub += ` Tough items will cycle back soon.`; }
  else               { icon = '↻';  head = `Difficult <em>round</em>`; sub += ` These items will come back in 10 minutes for another go.`; }

  return `
    <div class="pr-summary">
      <div class="pr-summary-icon">${icon}</div>
      <div class="pr-summary-h">${head}</div>
      <div class="pr-summary-sub">${sub}</div>
      <div class="pr-summary-grid">
        <div class="pr-summary-stat">
          <div class="pr-summary-stat-val ${pct >= 75 ? 'green' : (pct >= 50 ? 'amber' : '')}">${pct}%</div>
          <div class="pr-summary-stat-lbl">Correct</div>
        </div>
        <div class="pr-summary-stat">
          <div class="pr-summary-stat-val">${m.reviewed}</div>
          <div class="pr-summary-stat-lbl">Reviewed</div>
        </div>
        <div class="pr-summary-stat">
          <div class="pr-summary-stat-val">${m.bestStreak}</div>
          <div class="pr-summary-stat-lbl">Best streak</div>
        </div>
        <div class="pr-summary-stat">
          <div class="pr-summary-stat-val amber">${nextDue}</div>
          <div class="pr-summary-stat-lbl">Still due</div>
        </div>
      </div>
      <div class="pr-summary-actions">
        ${nextDue > 0 ? `<button class="btn btn-primary" onclick="startSession()" style="background:var(--gold);color:#1a1306;border-color:var(--gold)">Continue (${nextDue} items)</button>` : ''}
        ${nextDue === 0 && state.freshModeEnabled && state.aiKey ? `<button class="btn btn-gold" onclick="generateFreshItem()">✦ Generate fresh</button>` : ''}
        <button class="btn btn-ghost" onclick="nav('dashboard')">Back to dashboard</button>
        <button class="btn btn-ghost" onclick="nav('lessons')">Browse lessons</button>
      </div>
    </div>
  `;
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      Object.assign(state, d);
      // ─── Migrations ───
      // v1 → v2: introduce itemMastery, practiceLog, newItemsPerDay.
      // Existing completedLessons stays intact — completion is now
      // *derived* from itemMastery, but the old key still gets used
      // as a fallback (a unit reads as "complete" if any of its
      // items have correctReps>=2 OR if the legacy flag is set).
      if(!state.itemMastery || typeof state.itemMastery !== 'object') state.itemMastery = {};
      if(!state.practiceLog || typeof state.practiceLog !== 'object') state.practiceLog = {};
      if(typeof state.newItemsPerDay !== 'number') state.newItemsPerDay = 8;
      if((state.version || 1) < 2){
        state.version = 2;
        // Soft migration: previously-completed lessons are credited as
        // "introduced" items so they show up in the practice queue at
        // a low priority, rather than being treated as fully mastered
        // (because the user hasn't actually been DRILLED on them yet).
        // We do this lazily — the Practice panel will introduce the
        // items at its normal rate. No data transformation needed
        // here; the legacy completedLessons flag remains read-only
        // input to isLessonComplete.
        save();
      }
      // v2 → v3: auto-fresh enabled by default for users with an API
      // key. Add the counter and batch-size fields if missing.
      if(typeof state.autoFreshEnabled !== 'boolean'){
        state.autoFreshEnabled = !!state.aiKey;       // on if they already have a key
        state.freshModeEnabled = !!state.aiKey;       // mirror — auto implies manual
      }
      if(typeof state.autoFreshBatchSize !== 'number') state.autoFreshBatchSize = 5;
      if(typeof state.autoFreshTotalGenerated !== 'number') state.autoFreshTotalGenerated = 0;
      if(!Array.isArray(state.sentenceBuilderGenerated)) state.sentenceBuilderGenerated = [];
    }
  } catch(e){ console.warn('loadState failed', e); }
}
function save(){
  clearTimeout(saveTimer);
  showSave('saving');
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
    showSave('saved');
    setTimeout(() => showSave(''), 1600);
  }, 350);
}
function showSave(status){
  // Save indicator disabled per user preference. The badge element
  // stays in the DOM so existing callers don't crash, but it never
  // becomes visible. (Originally this displayed "⟳ saving…" / "✓ saved"
  // pills in the topbar; the user found them distracting.)
  const el = document.getElementById('save-badge');
  if(el) el.style.display = 'none';
}

// ─── ESCAPE ─────────────────────────────────────────────────────────────────
function esc(str){
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}

// ─── THEME ──────────────────────────────────────────────────────────────────
function toggleTheme(){
  state.darkMode = !state.darkMode;
  applyTheme();
  save();
}
function applyTheme(){
  document.body.classList.toggle('light', !state.darkMode);
  const btn = document.getElementById('theme-btn');
  if(btn) btn.textContent = state.darkMode ? '☾' : '☼';
}

// ─── TIER ──────────────────────────────────────────────────────────────────
function setTier(tier){
  if(!['conversational','professional','written'].includes(tier)) return;
  state.tier = tier;
  document.querySelectorAll('.tier-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tier === tier);
  });
  const lbl = document.getElementById('sb-tier-label');
  if(lbl) lbl.textContent = tier.charAt(0).toUpperCase() + tier.slice(1) + ' tier';
  save();
  // Tier change re-renders the active panel so lesson copy adapts.
  renderPanel(state.activePanel);
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────
function nav(panel){
  if(!VALID_PANELS.includes(panel)) return;
  if(typeof _beforeNav === 'function') _beforeNav(panel);
  state.activePanel = panel;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const p = document.getElementById('panel-' + panel);
  const n = document.querySelector('.nav-item[data-panel="' + panel + '"]');
  if(p) p.classList.add('active');
  if(n) n.classList.add('active');
  renderPanel(panel);
  const content = document.querySelector('.content');
  if(content) content.scrollTop = 0;
  // Auto-close mobile nav after the user picks a destination so the
  // sidebar doesn't stay open over the content they're trying to read.
  closeMobileNav();
  save();
}

// ─── MOBILE NAV TOGGLE ────────────────────────────────────────────────
// On narrow screens (<=760px) the sidebar is hidden by default and
// shown as a slide-in overlay when the hamburger button is clicked.
function toggleMobileNav(){
  const sb = document.querySelector('.sidebar');
  if(!sb) return;
  if(sb.classList.contains('mobile-open')){
    closeMobileNav();
  } else {
    sb.classList.add('mobile-open');
    // Add a backdrop the user can tap to close.
    let bd = document.getElementById('mobile-nav-backdrop');
    if(!bd){
      bd = document.createElement('div');
      bd.id = 'mobile-nav-backdrop';
      bd.className = 'mobile-nav-backdrop';
      bd.onclick = closeMobileNav;
      document.body.appendChild(bd);
    }
  }
}
function closeMobileNav(){
  const sb = document.querySelector('.sidebar');
  if(sb) sb.classList.remove('mobile-open');
  const bd = document.getElementById('mobile-nav-backdrop');
  if(bd) bd.remove();
}

  grammar:       { label:'Grammar Compass',   group:'Reference', icon:'⚖' },
  pronunciation: { label:'Pronunciation',     group:'Reference', icon:'🔊' },
  builder:       { label:'Sentence Builder',  group:'Reference', icon:'🧩' },
  glossary:      { label:'Glossary',          group:'Reference', icon:'📑' },
  settings:      { label:'Settings',          group:'System',    icon:'⚙' },
};

function decorateBreadcrumb(panel){
  const meta = PANEL_META[panel];
  if(!meta) return '';
  return `<div class="breadcrumb">
    <button onclick="nav('dashboard')">Svenska</button>
    <span class="bc-sep">›</span>
    <span class="bc-current">${esc(meta.group)}</span>
    <span class="bc-sep">›</span>
    <span class="bc-current" style="color:var(--text)">${esc(meta.label)}</span>
  </div>`;
}

function renderPanel(panel){
  const fns = {
    dashboard: renderDashboard,
    practice: renderPractice,
    lessons: renderLessons,
    grammar: renderGrammar,
    pronunciation: renderPronunciation,
    builder: renderBuilder,
    glossary: renderGlossary,
    settings: renderSettings,
  };
  if(fns[panel]) fns[panel]();
}

// ─── PANEL: DASHBOARD ─────────────────────────────────────────────────────
// Surfaces overall progress, a "continue here" card, and a quick grid of
// every track's status. Reads completion data from state.completedLessons
// via trackProgress() / totalProgress() so it's always in sync.
function renderDashboard(){
  const el = document.getElementById('panel-dashboard');
  if(!el) return;
  const total = totalProgress();
  const mastered = Object.keys(state.masteredTerms).length;
  const cont = pickContinueLesson();
  const contTrack = findTrack(cont.trackId);
  const contUnit = findUnit(cont.trackId, cont.unitId);

  // Practice queue stats — these drive the new primary CTA.
  const due = itemsDue().length;
  const today = new Date().toISOString().slice(0,10);
  const todayLog = state.practiceLog[today] || { reviews:0, correct:0, newItems:0 };
  const newAvail = Math.max(0, (state.newItemsPerDay || 8) - todayLog.newItems);
  const newCount = Math.min(newAvail, _sess.config.maxNew);
  const queueTotal = due + newCount;
  const summary = masterySummary();

  // Primary card — the daily practice CTA.
  // Three modes:
  //   1. Has a queue waiting (due > 0 OR new items available) → big "Start practice" CTA
  //   2. All caught up + no new available → gentle "Come back tomorrow" message
  //   3. Brand-new user (zero items seen) → onboarding-style "Begin your first session"
  let practiceCard;
  if(queueTotal === 0 && summary.seen === 0){
    practiceCard = `
      <div class="continue-card" style="background:linear-gradient(135deg, var(--gold-dim), var(--bg2));border-color:var(--gold)">
        <div class="continue-icon" style="color:var(--gold);font-size:32px">◐</div>
        <div class="continue-body">
          <div class="continue-eyebrow">Start here</div>
          <div class="continue-title">Begin your first practice session</div>
          <div class="continue-sub">${newCount} fresh items will introduce you to ${esc(state.tier)}-tier vocabulary, scheduled for spaced repetition.</div>
        </div>
        <button class="btn btn-gold" onclick="nav('practice'); setTimeout(startSession, 100)">Begin →</button>
      </div>
    `;
  } else if(queueTotal === 0){
    practiceCard = `
      <div class="continue-card" style="background:var(--bg2);border-color:var(--teal)">
        <div class="continue-icon" style="color:var(--teal);font-size:32px">✨</div>
        <div class="continue-body">
          <div class="continue-eyebrow">All caught up</div>
          <div class="continue-title">No items due right now</div>
          <div class="continue-sub">You've cleared today's queue and used your new-item quota. Items you reviewed today will cycle back over the coming days.</div>
        </div>
        <button class="btn btn-ghost" onclick="nav('practice')">View queue</button>
      </div>
    `;
  } else {
    practiceCard = `
      <div class="continue-card" style="background:linear-gradient(135deg, var(--gold-dim), var(--bg2));border-color:var(--gold)">
        <div class="continue-icon" style="color:var(--gold);font-size:32px">◐</div>
        <div class="continue-body">
          <div class="continue-eyebrow">Today's practice</div>
          <div class="continue-title">${queueTotal} item${queueTotal === 1 ? '' : 's'} ready</div>
          <div class="continue-sub">${due > 0 ? `<strong>${due}</strong> due for review` : ''}${due > 0 && newCount > 0 ? ' · ' : ''}${newCount > 0 ? `<strong>${newCount}</strong> new item${newCount === 1 ? '' : 's'} to introduce` : ''}${todayLog.reviews > 0 ? ` · ${todayLog.reviews} done already today` : ''}</div>
        </div>
        <button class="btn btn-gold" onclick="nav('practice'); setTimeout(startSession, 100)">Start →</button>
      </div>
    `;
  }

  // Lesson-continue card stays, but smaller / secondary.
  const continueLessonCard = contTrack && contUnit ? `
    <div class="continue-card" style="border-color:var(--border)">
      <div class="continue-icon" style="color:${contTrack.color}">${contTrack.icon}</div>
      <div class="continue-body">
        <div class="continue-eyebrow">Or read new material</div>
        <div class="continue-title">${esc(contUnit.title)}</div>
        <div class="continue-sub">${esc(contTrack.name)} · Unit ${contTrack.units.findIndex(u=>u.id===contUnit.id)+1} of ${contTrack.units.length}</div>
      </div>
      <button class="btn btn-ghost" onclick="openLesson('${contTrack.id}','${contUnit.id}')">Open lesson →</button>
    </div>
  ` : '';

  // Tier progress strip — shows completion split per tier so the user
  // sees how they're advancing along the conversational → professional
  // → written graduation. A lesson is counted under EVERY tier whose
  // variant exists for it, since marking the unit complete completes
  // it across tiers (decision: progress is per-unit, not per-variant).
  const tierStats = ['conversational','professional','written'].map(tier => {
    let totalT = 0, doneT = 0;
    TRACKS.forEach(t => {
      t.units.forEach(u => {
        if(u.byTier && u.byTier[tier]){

          if(isLessonComplete(t.id, u.id)) doneT++;
        }
      });
    });
    return { tier, total: totalT, done: doneT, pct: totalT > 0 ? Math.round(doneT/totalT*100) : 0 };
  });

  el.innerHTML = `
    ${decorateBreadcrumb('dashboard')}
    <div class="ph">
      <div class="ph-tag">Välkommen · Welcome</div>
      <div class="ph-title">Learn Swedish, <em>by translating</em><br>what you already know.</div>
      <div class="ph-sub">Daily spaced-repetition practice keeps lesson content alive. Read new material in the Lessons panel; drill it forever in Practice.</div>
    </div>

    ${practiceCard}
    ${continueLessonCard}

    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-icon">🔥</div>
        <div class="kpi-lbl">Streak</div>
        <div class="kpi-val mono">${state.streakDays}<span style="font-size:13px;color:var(--text2);font-weight:400;font-family:var(--ff-body);margin-left:6px">day${state.streakDays===1?'':'s'}</span></div>
        <div class="kpi-sub">Practice every day to grow it</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">◐</div>
        <div class="kpi-lbl">Items learned</div>
        <div class="kpi-val mono">${summary.learned}<span style="font-size:13px;color:var(--text3);font-weight:400;font-family:var(--ff-body);margin-left:4px">/ ${summary.total}</span></div>
        <div class="kpi-sub">${summary.mastered} mastered · ${summary.due} due now</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">📖</div>
        <div class="kpi-lbl">Lessons covered</div>
        <div class="kpi-val mono">${total.done}<span style="font-size:13px;color:var(--text3);font-weight:400;font-family:var(--ff-body);margin-left:4px">/ ${total.total}</span></div>
        <div class="kpi-sub">${total.pct}% of the library read</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🎚</div>
        <div class="kpi-lbl">Current tier</div>
        <div class="kpi-val" style="font-family:var(--ff-display);text-transform:capitalize;font-size:24px">${state.tier}</div>
        <div class="kpi-sub">Use the toggle in the top bar to graduate</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Tier graduation</div>
      <p style="font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px;max-width:680px">
        Each lesson has up to three tiers of variant content — start at the casual register and work toward formal written Swedish. Your overall completion is shared across tiers; switching the tier just changes the lens you see content through.
      </p>
      ${tierStats.map(t => `
        <div style="display:flex;align-items:center;gap:14px;padding:8px 0;border-bottom:1px solid var(--bg3)">
          <div style="width:120px;text-transform:capitalize;font-weight:600;color:${t.tier===state.tier?'var(--gold)':'var(--text2)'};font-family:var(--ff-display);font-size:15px">${t.tier}${t.tier===state.tier?' <span style="font-family:var(--ff-mono);font-size:9px;color:var(--gold);letter-spacing:0.06em">· ACTIVE</span>':''}</div>
          <div style="flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${t.pct}%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:4px;transition:width .5s"></div>
          </div>
          <div style="font-family:var(--ff-mono);font-size:11px;color:var(--text3);min-width:70px;text-align:right">${t.done} / ${t.total}</div>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <div class="card-title">Where to go next</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px">
        <button class="btn btn-ghost" onclick="nav('practice')" style="justify-content:flex-start;padding:14px 16px;border-color:var(--gold)"><span style="font-size:18px;margin-right:8px;color:var(--gold)">◐</span>Practice queue</button>
        <button class="btn btn-ghost" onclick="nav('lessons')" style="justify-content:flex-start;padding:14px 16px"><span style="font-size:18px;margin-right:8px">📖</span>Browse all lessons</button>
        <button class="btn btn-ghost" onclick="nav('grammar')" style="justify-content:flex-start;padding:14px 16px"><span style="font-size:18px;margin-right:8px">⚖</span>Grammar Compass</button>
        <button class="btn btn-ghost" onclick="nav('pronunciation')" style="justify-content:flex-start;padding:14px 16px"><span style="font-size:18px;margin-right:8px">🔊</span>Pronunciation lab</button>
        <button class="btn btn-ghost" onclick="nav('builder')" style="justify-content:flex-start;padding:14px 16px"><span style="font-size:18px;margin-right:8px">🧩</span>Sentence Builder</button>
        <button class="btn btn-ghost" onclick="nav('glossary')" style="justify-content:flex-start;padding:14px 16px"><span style="font-size:18px;margin-right:8px">📑</span>Glossary</button>

// ─── PANEL: LESSONS ───────────────────────────────────────────────────────
// Two views, controlled by state.openLesson:
//   - Track grid (default): every TRACK as a card with progress ring.
//   - Lesson detail: when openLesson is set, the panel renders that
//     unit's content for the active tier instead of the grid.
function renderLessons(){
  const el = document.getElementById('panel-lessons');
  if(!el) return;
  if(state.openLesson){
    renderLessonDetail();
    return;
  }
  const tierLabel = state.tier.charAt(0).toUpperCase() + state.tier.slice(1);
  const tierBlurb = {
    conversational: 'Casual everyday speech — friends, family, café, taxi. Shortest, simplest variants of each lesson.',
    professional:   'Workplace register — meetings, colleagues, clients. Polite without being stiff.',
    written:        'Formal written Swedish — emails, reports, news, official documents. Stricter grammar, fuller phrasing.',
  }[state.tier];

  const trackHtml = TRACKS.map(t => {
    const prog = trackProgress(t);
    // Compute practice mastery for this track at active tier.
    let totalItems = 0, learnedItems = 0, masteredItems = 0;
    t.units.forEach(u => {
      const s = unitMasteryStats(t.id, u.id);
      totalItems += s.total;
      learnedItems += s.learned;
      masteredItems += s.mastered;
    });
    const practicePct = totalItems > 0 ? Math.round((learnedItems / totalItems) * 100) : 0;
    // Pure SVG progress ring — circumference is 2πr; we shrink the
    // dashoffset proportional to completion. Centre text shows "%".
    const r = 18;
    const C = 2 * Math.PI * r;
    const off = C - (prog.pct / 100) * C;
    return `
      <div class="track-card" style="--track-color:${t.color}" onclick="openLesson('${t.id}','${t.units[0].id}')">
        <div class="track-card-head">
          <div class="track-icon">${t.icon}</div>
          <div class="track-meta">
            <div class="track-name">${esc(t.name)}</div>
            <div class="track-name-sv">${esc(t.nameSv)}</div>
          </div>
        </div>
        <div class="track-desc">${esc(t.desc)}</div>
        <div class="track-progress-row">
          <div class="progress-ring">
            <svg width="44" height="44" viewBox="0 0 44 44">
              <circle class="progress-ring-bg" cx="22" cy="22" r="${r}"></circle>
              <circle class="progress-ring-fg" cx="22" cy="22" r="${r}" stroke-dasharray="${C}" stroke-dashoffset="${off}"></circle>
            </svg>
            <div class="progress-ring-text">${prog.pct}%</div>
          </div>
          <div class="track-progress-meta">
            <div class="track-progress-count">${prog.done} / ${prog.total}</div>
            <div class="track-progress-label">${prog.done === prog.total ? 'Read complete' : prog.done > 0 ? 'In progress' : 'Not started'}</div>
            ${totalItems > 0 ? `<div style="font-family:var(--ff-mono);font-size:9px;letter-spacing:0.06em;color:var(--text3);margin-top:4px;text-transform:uppercase">Drill: ${learnedItems}/${totalItems} learned · ${masteredItems} mastered</div>` : ''}
          </div>
          <div class="track-cta">${prog.done > 0 ? 'Resume' : 'Start'} →</div>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    ${decorateBreadcrumb('lessons')}
    <div class="ph">
      <div class="ph-tag">Lärovägar · Learning paths</div>
      <div class="ph-title">Lessons</div>
      <div class="ph-sub">Six tracks, ordered loosely from "first contact" to "tell a story". Each unit shows English and Swedish side-by-side, with a "why is this different?" callout where Swedish diverges from English.</div>
    </div>

    <div class="tier-banner">
      <div class="tier-banner-icon">${state.tier==='conversational'?'💬':state.tier==='professional'?'💼':'📜'}</div>
      <div class="tier-banner-body">
        <div class="tier-banner-eyebrow">Active tier</div>
        <div class="tier-banner-title">${tierLabel}</div>
        <div class="tier-banner-sub">${esc(tierBlurb)}</div>
      </div>
    </div>

    <div class="track-grid">${trackHtml}</div>
  `;
}

// ─── LESSON DETAIL ───────────────────────────────────────────────────────
// Renders a single unit. Resolves which variant to show based on the
// active tier, falling back gracefully. Includes prev/next navigation
// within the track and a complete/uncomplete toggle.
function renderLessonDetail(){
  const el = document.getElementById('panel-lessons');
  if(!el || !state.openLesson) return;
  const { trackId, unitId } = state.openLesson;
  const track = findTrack(trackId);
  const unit = track ? track.units.find(u => u.id === unitId) : null;
  if(!track || !unit){
    state.openLesson = null;
    save();
    return renderLessons();
  }
  const idx = track.units.findIndex(u => u.id === unitId);
  const prev = idx > 0 ? track.units[idx-1] : null;
  const next = idx < track.units.length-1 ? track.units[idx+1] : null;
  const { variant, usedTier } = getLessonVariant(unit, state.tier);
  const tierMatched = usedTier === state.tier;
  const complete = isLessonComplete(trackId, unitId);

  // No variant exists for any tier — defensive, shouldn't happen with
  // current data, but renders a clean message instead of breaking.
  if(!variant){
    el.innerHTML = `
      ${decorateBreadcrumb('lessons')}
      <div class="lesson-detail" style="--track-color:${track.color}">
        <button class="lesson-back" onclick="closeLesson()">← Back to lessons</button>
        <div class="state-empty">
          <div class="se-icon">∅</div>
          <div class="se-title">This lesson is empty</div>
          <div class="se-sub">No content has been authored for this unit yet.</div>
        </div>
      </div>`;
    return;
  }

  const pairsHtml = (variant.pairs || []).map(p => `
    <div class="pair">
      <div class="pair-side pair-side-en">
        <div class="pair-lang">English</div>
        <div class="pair-text">${esc(p.en)}</div>
      </div>
      <div class="pair-arrow">→</div>
      <div class="pair-side pair-side-sv">
        <div class="pair-lang">Svenska</div>
        <div class="pair-text">${esc(p.sv)}</div>
        ${p.note ? `<div class="pair-note">${p.note}</div>` : ''}
      </div>
    </div>
  `).join('');

  const contrastHtml = variant.contrast ? `
    <div class="contrast-note">
      <div class="contrast-note-icon">⚖</div>
      <div class="contrast-note-body">
        <div class="contrast-note-title">${esc(variant.contrast.title)}</div>
        <div class="contrast-note-text">${variant.contrast.text}</div>
      </div>
    </div>
  ` : '';

  // Inline notice if the active tier doesn't have content for this unit
  // and we fell back. Keeps the user oriented about what they're seeing.
  const fallbackNotice = !tierMatched ? `
    <div style="background:var(--plum-dim);border:1px dashed var(--plum);border-radius:10px;padding:10px 14px;margin-bottom:18px;font-family:var(--ff-mono);font-size:11px;color:var(--plum);letter-spacing:0.02em">
      ⓘ No <strong style="text-transform:uppercase">${state.tier}</strong>-tier content authored for this unit yet — showing the <strong style="text-transform:uppercase">${usedTier}</strong> variant instead.
    </div>` : '';

  el.innerHTML = `
    <div class="breadcrumb">
      <button onclick="nav('dashboard')">Svenska</button>
      <span class="bc-sep">›</span>
      <button onclick="closeLesson()">Lessons</button>
      <span class="bc-sep">›</span>
      <span class="bc-current">${esc(track.name)}</span>
      <span class="bc-sep">›</span>
      <span class="bc-current" style="color:var(--text)">${esc(unit.title)}</span>
    </div>

    <div class="lesson-detail" style="--track-color:${track.color}">
      <button class="lesson-back" onclick="closeLesson()">← All lessons</button>

      <div class="lesson-header">
        <div class="lesson-title-row">
          <div class="lesson-icon">${track.icon}</div>
          <div>
            <div class="lesson-title-en">${esc(unit.title)}</div>
          </div>
        </div>
        <div class="lesson-pills">
          <span class="lesson-pill">${esc(track.name)}</span>
          <span class="lesson-pill">${esc(unit.eyebrow)} of ${track.units.length}</span>
          <span class="lesson-pill tier-${usedTier}">${usedTier}</span>
          ${complete ? '<span class="mastered-badge">✓ COMPLETE</span>' : ''}
        </div>
        ${renderUnitMasteryDots(trackId, unitId)}
      </div>

      ${fallbackNotice}

      <div class="unit">
        <div class="unit-eyebrow">${esc(unit.eyebrow)}</div>
        <div class="unit-title">${esc(unit.title)}</div>
        <div class="unit-explain">${variant.explain}</div>

        ${pairsHtml}

        ${contrastHtml}
      </div>

      <div class="lesson-actions">
        <button class="btn btn-gold" onclick="practiceUnit('${trackId}','${unitId}')" title="Drill the items in this unit (skips the queue)">◐ Practice these items</button>
        <button class="btn ${complete ? 'btn-ghost' : 'btn-primary'}" onclick="toggleComplete('${trackId}','${unitId}')">
          ${complete ? '↺ Mark as incomplete' : '✓ Mark as complete'}
        </button>
        ${prev ? `<button class="btn btn-ghost" onclick="openLesson('${trackId}','${prev.id}')">← ${esc(prev.title)}</button>` : ''}
        ${next ? `<button class="btn btn-ghost" onclick="openLesson('${trackId}','${next.id}')">${esc(next.title)} →</button>` : ''}
        <span class="lesson-progress-text">Unit ${idx+1} of ${track.units.length}</span>
      </div>
    </div>
  `;
}

// ─── LESSON OPEN/CLOSE/COMPLETE HANDLERS ──────────────────────────────────
function openLesson(trackId, unitId){
  state.openLesson = { trackId, unitId };
  save();
  if(state.activePanel !== 'lessons') nav('lessons');
  else renderLessons();
  // Scroll content area to top so the lesson header is in view.
  const c = document.querySelector('.content');
  if(c) c.scrollTop = 0;
}
function closeLesson(){
  state.openLesson = null;
  save();
  renderLessons();
}
function toggleComplete(trackId, unitId){
  if(isLessonComplete(trackId, unitId)) unmarkLessonComplete(trackId, unitId);
  else markLessonComplete(trackId, unitId);
  // Re-render detail to update the badge + button label.
  renderLessons();
  // Sidebar streak/progress doesn't auto-update across panels, but since
  // the user is still on Lessons, the next dashboard visit will catch up.
}

// Patch nav() so leaving the Lessons panel auto-clears any open lesson —
// otherwise navigating to Grammar then back would still show the detail
// view rather than the track grid. We can't simply reassign the
// function-declared `nav` (the binding is read-only inside a function
// declaration's scope chain), so we install a beforeNav hook checked
// inside nav() itself.
function _beforeNav(panel){
  if(panel !== 'lessons' && state.openLesson){
    state.openLesson = null;
  }
}

// ─── PANEL: GRAMMAR COMPASS ───────────────────────────────────────────────

      <span class="compass-topic-label">

        <div class="compass-topic-title-sv">${esc(t.titleSv)}</div>
      </span>
    </button>
  `).join('');

  el.innerHTML = `
    ${decorateBreadcrumb('grammar')}
    <div class="ph">
      <div class="ph-tag">Grammatik · Contrastive analysis</div>
      <div class="ph-title">Grammar <em>Compass</em></div>
      <div class="ph-sub">Where Swedish diverges from English — and what to do about it. Eight modules, each with a TL;DR, side-by-side examples, the trap that catches English speakers, and a quick self-check.</div>
    </div>

    <div class="compass-layout">
      <div class="compass-rail">
        <div class="compass-rail-head">Topics</div>
        ${railHtml}
      </div>
      <div class="compass-module">${renderGrammarModule(topic)}</div>

}

// Render the right-pane content for one topic. Splits long modules into
// <section>s, each with an optional title, body HTML, slot diagrams,
// example pairs, or a comparison table.
function renderGrammarModule(t){
  const sections = (t.sections || []).map(sec => `
    <div class="compass-section">
      ${sec.title ? `<div class="compass-section-h">${esc(sec.title)}</div>` : ''}
      ${sec.body ? `<div class="compass-section-body">${sec.body}</div>` : ''}
      ${sec.slots ? renderSlotDiagrams(sec.slots) : ''}
      ${sec.examples ? renderExamplePairs(sec.examples) : ''}
      ${sec.compare ? renderCompareTable(sec.compare) : ''}
    </div>
  `).join('');

  const traps = (t.traps || []).map(tr => `
    <div class="trap">
      <div class="trap-icon">⚠</div>
      <div class="trap-body">
        <div class="trap-title">${esc(tr.title)}</div>
        <div class="trap-text">${tr.text}</div>
      </div>
    </div>

  const quiz = t.quiz ? renderMiniQuiz(t.quiz) : '';

  return `
    <div class="compass-eyebrow">
      <span class="compass-eyebrow-tag">${esc(t.eyebrow || '')}</span>
      <span class="compass-eyebrow-sv">${esc(t.titleSv)}</span>

    <h1 class="compass-h">${t.icon} ${esc(t.titleEn)}</h1>
    <div class="compass-tldr">${t.tldr}</div>

}

// ─── HELPER: render a list of slot-diagram rows ─────────────────────────

    <tbody>

// ─── HELPER: render a mini-quiz ─────────────────────────────────────────
// Renders a single multiple-choice quiz with click handlers that reveal
// correct/wrong styling and an explanation. The pick is held in
// _quizPicks (session-only) so re-renders preserve the user's answer.
function renderMiniQuiz(q){
  const picked = _quizPicks[q.id];
  const optsHtml = q.options.map((opt, i) => {
    let cls = 'mini-quiz-opt';
    if(picked != null){
      if(opt.correct) cls += ' correct';
      if(picked === i && !opt.correct) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="pickQuiz('${q.id}', ${i})">${esc(opt.text)}</button>`;
  }).join('');
  let feedback = '';
  if(picked != null){
    const opt = q.options[picked];
    feedback = `<div class="mini-quiz-feedback ${opt.correct ? 'is-correct' : 'is-wrong'}">${opt.correct ? '✓ ' : '✗ '}${opt.explain}</div>`;
  }
  return `
    <div class="mini-quiz">
      <div class="mini-quiz-eyebrow">Quick check</div>
      <div class="mini-quiz-q">${q.question}</div>
      <div class="mini-quiz-options">${optsHtml}</div>
      ${feedback}
    </div>`;
}

function pickQuiz(qid, optIdx){
  _quizPicks[qid] = optIdx;
  // Lightweight re-render — only the grammar panel needs to update.
  renderGrammar();
  // Track quiz attempts in the masteredTerms ledger (loosely — every
  // correct quiz adds the topic id to the mastered set).
  const topic = GRAMMAR_TOPICS.find(t => t.quiz && t.quiz.id === qid);
  if(topic && topic.quiz.options[optIdx]?.correct){
    state.masteredTerms['quiz:' + qid] = Date.now();
    save();
  }
}

function openGrammar(topicId){
  if(!findGrammarTopic(topicId)) return;
  state.openGrammar = topicId;
  save();
  if(state.activePanel !== 'grammar') nav('grammar');
  else renderGrammar();
  const c = document.querySelector('.content');
  if(c) c.scrollTop = 0;
}

// ─── TERM TOOLTIP — global hover handler ───────────────────────────────
// Single floating tooltip element re-used across all .term hovers.
let _termTip = null;
function _ensureTermTip(){
  if(_termTip) return _termTip;
  _termTip = document.createElement('div');
  _termTip.className = 'term-tip';
  document.body.appendChild(_termTip);
  return _termTip;
}
function _showTermTip(target, key){
  const data = TERMS[key];
  if(!data) return;
  const tip = _ensureTermTip();
  tip.innerHTML = `
    <div class="term-tip-h">${esc(data.label)}</div>
    <div>${data.short}</div>
    ${data.en ? `<div class="term-tip-en">${data.en}</div>` : ''}
    ${data.sv ? `<div class="term-tip-sv">${data.sv}</div>` : ''}
  `;
  // Position next to the cursor target, flipping if it would clip.
  const r = target.getBoundingClientRect();
  tip.style.display = 'block';
  // Force layout to measure the tooltip itself.
  const tr = tip.getBoundingClientRect();
  let left = r.left;
  let top = r.bottom + 8;
  if(left + tr.width > window.innerWidth - 12) left = window.innerWidth - tr.width - 12;
  if(top + tr.height > window.innerHeight - 12) top = r.top - tr.height - 8;
  tip.style.left = Math.max(10, left) + 'px';
  tip.style.top  = Math.max(10, top) + 'px';
  // Trigger CSS transition.
  requestAnimationFrame(() => tip.classList.add('show'));
}
function _hideTermTip(){
  if(!_termTip) return;
  _termTip.classList.remove('show');
}
// Delegated event handlers on the document — covers any .term span,
// even ones rendered into panels we haven't built yet (Glossary,
// Pronunciation, etc., once they ship).
document.addEventListener('mouseover', (e) => {
  const t = e.target.closest('.term');
  if(!t) return;
  const key = t.getAttribute('data-term');
  if(!key) return;
  _showTermTip(t, key);
});
document.addEventListener('mouseout', (e) => {
  const t = e.target.closest('.term');
  if(!t) return;
  _hideTermTip();
});
// Also support keyboard focus for accessibility.
document.addEventListener('focusin', (e) => {
  const t = e.target.closest('.term');
  if(!t) return;
  const key = t.getAttribute('data-term');
  if(key) _showTermTip(t, key);
});
document.addEventListener('focusout', (e) => {
  const t = e.target.closest('.term');
  if(t) _hideTermTip();
});

// ═══════════════════════════════════════════════════════════════
// PRONUNCIATION LAB
// ═══════════════════════════════════════════════════════════════
// Uses Web Speech API (window.speechSynthesis) for browser-native TTS.
// No server, no API keys — works offline once the browser has loaded
// at least one Swedish voice. Voice availability varies by browser
// and OS (Safari/macOS ships excellent Swedish voices out of the box;
// Chrome/Windows depends on the OS voice library).

// ─── TTS ENGINE ─────────────────────────────────────────────────────────
// Cache the discovered voice list. Voices load asynchronously in
// Chrome — getVoices() returns [] on first call, then voiceschanged
// fires once they're ready.
let _ttsVoices = [];
let _ttsReady = false;
let _ttsCurrent = null;   // currently-speaking utterance, for cancellation
let _ttsActiveBtn = null; // the DOM element pulsing while audio plays

function ttsAvailable(){
  return typeof window !== 'undefined' && 'speechSynthesis' in window;
}

function ttsLoadVoices(){
  if(!ttsAvailable()) return [];
  const all = window.speechSynthesis.getVoices() || [];
  // Keep only Swedish voices. The lang code is sometimes "sv-SE",
  // sometimes "sv_SE", sometimes just "sv" — match all variants.
  _ttsVoices = all.filter(v => /^sv(-|_|$)/i.test(v.lang || ''));
  _ttsReady = true;
  return _ttsVoices;
}

function ttsPickVoice(){
  if(!_ttsVoices.length) ttsLoadVoices();
  if(!_ttsVoices.length) return null;
  // Prefer the user's saved choice if it still exists.
  if(state.voicePref){
    const saved = _ttsVoices.find(v => v.voiceURI === state.voicePref);
    if(saved) return saved;
  }
  // Otherwise prefer a "default" voice marked by the OS, then fall
  // back to the first Swedish voice in the list.
  return _ttsVoices.find(v => v.default) || _ttsVoices[0];
}

// Speak a Swedish word/phrase. Optionally pass a button DOM ref to
// pulse during playback. Cancels any in-flight utterance first so
// rapid clicks don't queue up.
function speak(text, opts){
  opts = opts || {};
  if(!ttsAvailable()){
    showToast('This browser doesn\'t support Web Speech.');
    return;
  }
  // Stop anything currently speaking.
  window.speechSynthesis.cancel();
  if(_ttsActiveBtn){
    _ttsActiveBtn.classList.remove('is-playing');
    _ttsActiveBtn = null;
  }
  const u = new SpeechSynthesisUtterance(text);
  const v = ttsPickVoice();
  if(v){
    u.voice = v;
    u.lang  = v.lang;
  } else {
    u.lang = 'sv-SE';
  }
  u.rate = opts.rate != null ? opts.rate : (state.ttsRate || 0.85);
  u.pitch = 1;
  u.volume = 1;
  if(opts.btn){
    _ttsActiveBtn = opts.btn;
    opts.btn.classList.add('is-playing');
  }
  u.onend = u.onerror = () => {
    if(opts.btn) opts.btn.classList.remove('is-playing');
    if(_ttsActiveBtn === opts.btn) _ttsActiveBtn = null;
    if(typeof opts.onend === 'function') opts.onend();
  };
  _ttsCurrent = u;
  window.speechSynthesis.speak(u);
}

// Initialize TTS on page load — Chrome fires voiceschanged once,
// Safari has voices ready immediately. Re-render the panel after
// load so the voice dropdown populates.
function initTTS(){
  if(!ttsAvailable()) return;
  ttsLoadVoices();
  if('onvoiceschanged' in window.speechSynthesis){
    window.speechSynthesis.onvoiceschanged = () => {
      ttsLoadVoices();
      if(state.activePanel === 'pronunciation') renderPronunciation();
    };
  }
}

// Toast helper for one-off notifications (TTS unavailable, etc.).
function showToast(msg){
  let t = document.getElementById('app-toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'app-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text);border:1px solid var(--border2);padding:10px 16px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:opacity .2s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2400);
}

// ─── PANEL: PRONUNCIATION LAB ───────────────────────────────────────────

  const el = document.getElementById('panel-pronunciation');

  } else {

  // Phoneme grid.

      <div class="ph-sub">The sounds English doesn't have — <em>sje</em>, <em>tj</em>, å, ä, ö — plus vowel length and pitch accent. Browser-native audio: no server, no API key. Click any italic word to hear it.</div>
    </div>

// Render a single phoneme card. The card-level CSS variable
// --phoneme-color is set per-card based on the data's color key.
function renderPhonemeCard(p){
  const colors = { gold:'var(--gold)', blue:'var(--blue)', teal:'var(--teal)', plum:'var(--plum)' };
  const c = colors[p.color] || 'var(--accent)';
  const wordsHtml = p.words.map(w => `
    <span class="phoneme-word" onclick="speak('${esc(w.sv).replace(/'/g, "\\'")}', {btn:this})">
      <span class="play-icon">▶</span>${esc(w.sv)}
      <span class="pw-en">${esc(w.en)}</span>
    </span>
  `).join('');
  return `
    <div class="phoneme-card" style="--phoneme-color:${c}">
      <div class="phoneme-head">
        <div class="phoneme-glyph">${esc(p.glyph)}</div>
        <div class="phoneme-meta">
          <div class="phoneme-name">${esc(p.name)}</div>
          <div class="phoneme-ipa">${esc(p.ipa)}</div>
        </div>
      </div>
      <div class="phoneme-approx">${p.approx}</div>
      <div class="phoneme-tip">${p.tip}</div>
      <div class="phoneme-words">${wordsHtml}</div>
    </div>
  `;
}

// Render a single pitch-accent card: two sides (acute / grave) side
// by side, each with its own play button and a hand-drawn SVG curve.
function renderPitchCard(p){
  // SVG curves illustrating the melody shape, normalized to 0..120 width
  // and 0..40 height (with y inverted because SVG y grows downward).
  // Accent 1: single fall.   Accent 2: fall–rise–fall (double peak).
  const curve1 = `M 5 5 Q 60 5 115 35`;
  const curve2 = `M 5 12 Q 25 5 45 18 Q 65 32 80 14 Q 95 5 115 28`;
  const w = esc(p.word);
  return `
    <div class="pitch-card">
      <div class="pitch-side accent-1">
        <div class="pitch-side-head">
          <span class="pitch-tag">Accent 1 · acute</span>
        </div>
        <div class="pitch-word">${w}</div>
        <div class="pitch-meaning">${esc(p.accent1.meaning)}</div>
        <div style="font-family:var(--ff-mono);font-size:10.5px;color:var(--text3);letter-spacing:0.02em;line-height:1.5">
          <div>IPA: ${esc(p.accent1.ipa)}</div>
          <div>${esc(p.accent1.pattern)}</div>
        </div>
        <svg class="pitch-curve" viewBox="0 0 120 40" preserveAspectRatio="none" aria-hidden="true">
          <path d="${curve1}"/>
        </svg>
        <button class="btn-play-pitch" onclick="speak('${w.replace(/'/g, "\\'")}', {btn:this})">▶ play</button>
      </div>
      <div class="pitch-side accent-2">
        <div class="pitch-side-head">
          <span class="pitch-tag">Accent 2 · grave</span>
        </div>
        <div class="pitch-word">${w}</div>
        <div class="pitch-meaning">${esc(p.accent2.meaning)}</div>
        <div style="font-family:var(--ff-mono);font-size:10.5px;color:var(--text3);letter-spacing:0.02em;line-height:1.5">
          <div>IPA: ${esc(p.accent2.ipa)}</div>
          <div>${esc(p.accent2.pattern)}</div>
        </div>
        <svg class="pitch-curve" viewBox="0 0 120 40" preserveAspectRatio="none" aria-hidden="true">
          <path d="${curve2}"/>
        </svg>
        <button class="btn-play-pitch" onclick="speak('${w.replace(/'/g, "\\'")}', {btn:this})">▶ play</button>
      </div>
      ${p.note ? `<div style="grid-column:1/-1;font-size:12.5px;color:var(--text3);line-height:1.6;font-style:italic;margin-top:-4px">${p.note}</div>` : ''}
    </div>
  `;
}

// ─── A/B DISCRIMINATION DRILL ───────────────────────────────────────────
// Picks a random minimal pair, picks one of the two sides at random,
// plays it, then asks the user to identify which one was played.
// State held in module-scope (not persisted in localStorage — score
// is, but the in-flight pick isn't).
let _abPick = null;   // {pair, side: 'a'|'b'}
let _abFeedback = '';
let _abFeedbackKind = '';   // 'is-correct' | 'is-wrong' | ''
function _abRandom(){
  // Flatten all minimal pairs into a single bag.
  const bag = [];
  MINIMAL_PAIRS.forEach(set => set.pairs.forEach(pr => bag.push(pr)));
  const pair = bag[Math.floor(Math.random() * bag.length)];
  const side = Math.random() < 0.5 ? 'a' : 'b';
  return { pair, side };
}
function abNew(){
  _abPick = _abRandom();
  _abFeedback = '';
  _abFeedbackKind = '';
  renderPronunciation();
  // Auto-play after a slight delay so the user can see the new pair.
  setTimeout(() => abReplay(), 250);
}
function abReplay(){
  if(!_abPick) return;
  const word = _abPick.pair[_abPick.side].sv;
  const btn = document.querySelector('.ab-btn[data-role="play"]');
  speak(word, { btn });
}
function abGuess(side){
  if(!_abPick) return;
  state.pronunciationDrillScores.ab = state.pronunciationDrillScores.ab || { attempts:0, correct:0 };
  state.pronunciationDrillScores.ab.attempts++;
  if(side === _abPick.side){
    state.pronunciationDrillScores.ab.correct++;
    _abFeedback = `✓ Right! That was <em>${esc(_abPick.pair[_abPick.side].sv)}</em> — ${esc(_abPick.pair[_abPick.side].en)}.`;
    _abFeedbackKind = 'is-correct';
  } else {
    _abFeedback = `✗ Not quite. That was <em>${esc(_abPick.pair[_abPick.side].sv)}</em> — ${esc(_abPick.pair[_abPick.side].en)}, not <em>${esc(_abPick.pair[side].sv)}</em>.`;
    _abFeedbackKind = 'is-wrong';
  }
  save();
  renderPronunciation();
}
function renderAbDrill(){
  const score = state.pronunciationDrillScores.ab || { attempts:0, correct:0 };
  if(!_abPick){
    return `
      <div class="ab-drill">
        <div class="ab-drill-prompt">Ready to test your ears?</div>
        <div class="ab-controls">
          <button class="ab-btn" onclick="abNew()">▶ Start drill</button>
          <span class="ab-score">Score <span class="ab-score-val">${score.correct}/${score.attempts}</span></span>
        </div>
      </div>
    `;
  }
  // Determine guess-button styling based on whether user has answered.
  const answered = !!_abFeedback;
  const correctSide = _abPick.side;
  const cellHtml = ['a', 'b'].map(s => {
    let cls = 'ab-guess';
    if(answered){
      if(s === correctSide) cls += ' correct';
      else if(_abFeedbackKind === 'is-wrong') cls += ' wrong';
    }
    const w = _abPick.pair[s];
    return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="abGuess('${s}')">
      ${esc(w.sv)}
      <span class="ab-guess-meaning">${esc(w.en)}</span>
    </button>`;
  }).join('');
  return `
    <div class="ab-drill">
      <div class="ab-drill-prompt">Listen carefully. <strong>Which word</strong> did you just hear?</div>
      <div class="ab-controls">
        <button class="ab-btn" data-role="play" onclick="abReplay()">▶ Replay</button>
        ${answered ? `<button class="ab-btn" onclick="abNew()">↺ Next pair</button>` : ''}
        <span class="ab-score">Score <span class="ab-score-val">${score.correct}/${score.attempts}</span></span>
      </div>
      <div class="ab-guess-row">${cellHtml}</div>
      <div class="ab-feedback ${_abFeedbackKind}">${_abFeedback}</div>
    </div>
  `;
}

// Map level → 0..2 for ordering and color, and the canonical labels.
const SB_LEVELS = [
  { id:'starter',      label:'Starter',      pct:0 },
  { id:'intermediate', label:'Intermediate', pct:1 },
  { id:'advanced',     label:'Advanced',     pct:2 },
];

// ─── BUILDER STATE (session-only) ───────────────────────────────────────
// `slots` is an array sized to the answer length. Each entry is either
// null (empty) or an integer index into `bank` (the tile this slot
// holds). `bank` is the shuffled pool of words to choose from. `usage`
// mirrors which bank tiles are currently in slots.
const _sb = {
  level:'starter',
  exercise:null,        // currently-loaded exercise object
  bank:[],              // [{word, used, originalIdx}]
  slots:[],             // array of bank-indices or null
  hintLevel:0,          // 0 = none, 1 = verb position, 2 = + subject, 3 = full reveal
  checked:false,        // has the user clicked Check?
  resultKind:'',        // 'ok' | 'no' | ''
};

function sbPick(level){
  // Combine curated + AI-generated exercises at this level.
  const generated = (state.sentenceBuilderGenerated || []).filter(e => e.level === level);
  const pool = [...SB_EXERCISES, ...generated].filter(e => e.level === level);
  // Track which exercise IDs the user has seen RECENTLY so we don't
  // immediately repeat. We treat the last `pool.length / 2` runs as
  // "recent" — that way the user always has a fresh option to draw
  // from until the pool is at least 2× the recent-window.
  const recentRuns = (state.sentenceBuilderRuns || []).slice(-Math.max(3, Math.floor(pool.length / 2)));
  const recentIds = new Set(recentRuns.map(r => r.id));
  let candidates = pool.filter(e => !recentIds.has(e.id));
  // If everything is recent, fall back to the full pool minus the
  // single most recent (to avoid back-to-back repeats only).
  if(candidates.length === 0){
    const last = (state.sentenceBuilderRuns || []).slice(-1)[0];
    candidates = pool.filter(e => !last || e.id !== last.id);
    if(candidates.length === 0) candidates = pool;
  }
  return candidates[Math.floor(Math.random() * candidates.length)];
}

// AUTO-FRESH for Sentence Builder. Generates an exercise at the given
// difficulty level and adds it to state.sentenceBuilderGenerated. Runs
// in the background after sbCheck so the next sbNext has fresh material
// without the user waiting.
async function sbGenerateExerciseInBackground(level){
  if(!state.aiKey) return;
  if(!state.autoFreshEnabled) return;
  if(_sbGenerating) return;
  _sbGenerating = true;
  try {
    const exercise = await sbGenerateOneExercise(level);
    if(!Array.isArray(state.sentenceBuilderGenerated)) state.sentenceBuilderGenerated = [];
    state.sentenceBuilderGenerated.push(exercise);
    save();
  } catch(e){
    // Silent failure — don't show a toast. If generation breaks, the
    // builder still works with the curated pool. We'll log to console
    // for debugging.
    console.warn('SB generation failed:', e.message);
  }
  _sbGenerating = false;
}
let _sbGenerating = false;

// Build ONE Sentence Builder exercise via Claude. The model returns
// the same {en, sv, note} shape we use for Practice items, then we
// tokenize and shape it into the slot/role format SB needs.
async function sbGenerateOneExercise(level){
  const guide = {
    starter: 'a simple subject-first sentence (3–4 words). Pattern: subject + verb + (object/complement). Example: "Jag dricker kaffe." or "Hon bor i Stockholm."',
    intermediate: 'a sentence demonstrating V2 word order with something fronted (time, place, or object first). The verb must be in slot 2 and the subject in slot 3. Example: "Imorgon åker jag till Stockholm." (5–6 words)',
    advanced: 'a sentence with EITHER a subordinate clause demonstrating BIFF (att/när/om + inte before the finite verb) OR a modal verb construction OR a compound tense. (6–9 words)',
  }[level] || guide.starter;
  const tier = state.tier || 'conversational';
  const tierGuide = {
    conversational: 'casual, everyday Swedish',
    professional: 'workplace register, slightly more formal',
    written: 'formal written Swedish',
  }[tier];
  // Avoid duplicates by showing the model what's already in the pool.
  const existing = [...SB_EXERCISES, ...(state.sentenceBuilderGenerated || [])]
    .filter(e => e.level === level)
    .slice(-10)
    .map(e => e.sv.map(s => s.word).join(' '))
    .join(' / ');
  const sysPrompt = `You generate one Swedish/English sentence-builder exercise. Output ONLY raw JSON, no markdown, no commentary.
Schema: {"en": "<English source>", "sv": "<Swedish translation>", "note": "<one-sentence pedagogical note about the V2 word-order or grammar pattern, optional>"}
Constraints:
- Difficulty level: ${level}. Make it ${guide}
- Register: ${tierGuide}
- Avoid duplicating any of these recent items: ${existing || '(none)'}
- Use natural Swedish, not literal calques from English.
- Words should not contain punctuation except for sentence-final period or question mark on the LAST word.
Example output: {"en":"Tomorrow I drink coffee.","sv":"Imorgon dricker jag kaffe.","note":"V2 inversion — time-fronted, verb claims slot 2."}`;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': state.aiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: 250,
      system: sysPrompt,
      messages: [{ role:'user', content:`Generate a fresh ${level}-level sentence-builder exercise.` }],
    }),
  });
  if(!resp.ok){
    const txt = await resp.text();
    let detail = txt;
    try { detail = JSON.parse(txt).error?.message || txt; } catch(e){}
    throw new Error('API error (' + resp.status + '): ' + detail);
  }
  const data = await resp.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  const cleaned = text.replace(/```json|```/g, '').trim();
  let parsed;
  try { parsed = JSON.parse(cleaned); }
  catch(e){
    const m = cleaned.match(/\{[\s\S]*?\}/);
    if(m) parsed = JSON.parse(m[0]);
    else throw new Error('Could not parse response');
  }
  if(!parsed.en || !parsed.sv) throw new Error('Incomplete response');
  // Tokenize the SV into the slot/role/color shape the Sentence Builder needs.
  const tokens = tokenizeSwedish(parsed.sv);
  // Bump the auto-fresh counter so Settings shows the cumulative cost.
  state.autoFreshTotalGenerated = (state.autoFreshTotalGenerated || 0) + 1;
  return {
    id: 'sb-gen::' + Date.now() + '::' + Math.random().toString(36).slice(2, 7),
    level,
    prompt: parsed.en,
    sv: tokens.map(t => ({ word: t.word, role: t.role, color: t.color })),
    hint: parsed.note || null,
    generated: true,
  };
}

function sbLoad(exercise){
  if(!exercise) return;
  _sb.exercise = exercise;
  // The bank is the canonical answer's words, shuffled. Each tile
  // remembers its original answer-index — that's how we score later.
  const tiles = exercise.sv.map((s, i) => ({ word:s.word, used:false, originalIdx:i }));
  // Fisher-Yates shuffle.
  for(let i = tiles.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }
  _sb.bank = tiles;
  _sb.slots = new Array(exercise.sv.length).fill(null);
  _sb.hintLevel = 0;
  _sb.checked = false;
  _sb.resultKind = '';
}

// Place a tile from the bank into the next empty slot.
function sbPlace(bankIdx){
  if(_sb.checked) return;
  if(_sb.bank[bankIdx].used) return;
  const slotIdx = _sb.slots.findIndex(v => v == null);
  if(slotIdx < 0) return;
  _sb.slots[slotIdx] = bankIdx;
  _sb.bank[bankIdx].used = true;
  renderBuilder();
}

// Click a placed slot: pull the tile back to the bank.
function sbReturn(slotIdx){
  if(_sb.checked) return;
  const bankIdx = _sb.slots[slotIdx];
  if(bankIdx == null) return;
  _sb.bank[bankIdx].used = false;
  _sb.slots[slotIdx] = null;
  renderBuilder();
}

// Reset to a fresh shuffle of the SAME exercise.
function sbReset(){
  if(!_sb.exercise) return;
  sbLoad(_sb.exercise);
  renderBuilder();
}

// Move on to the next random exercise at the current level.
function sbNext(){
  const ex = sbPick(_sb.level);
  sbLoad(ex);
  renderBuilder();
}

function sbSetLevel(level){
  _sb.level = level;
  sbNext();
}

// Hint: cycles through 3 levels of progressive help.
//   1 → highlight which slot the verb belongs in
//   2 → also show subject position
//   3 → fill the answer in (counts as a "skip")
function sbHint(){
  if(_sb.checked) return;
  _sb.hintLevel = Math.min(3, _sb.hintLevel + 1);
  if(_sb.hintLevel === 3){
    // Auto-fill correct answer for revelation.
    _sb.bank.forEach(t => t.used = true);
    _sb.slots = _sb.exercise.sv.map((_, i) => {
      // Find the bank tile whose originalIdx === i
      return _sb.bank.findIndex(t => t.originalIdx === i);
    });
  }
  renderBuilder();
}

// Check the user's answer against the canonical order.
function sbCheck(){
  if(!_sb.exercise) return;
  // Allow check only if all slots are filled.
  if(_sb.slots.some(v => v == null)){
    showToast('Fill every slot first.');
    return;
  }
  // For each filled slot, compare the placed tile's originalIdx
  // against the slot index. They should match for a perfect answer.
  let allCorrect = true;
  for(let i = 0; i < _sb.slots.length; i++){
    const tile = _sb.bank[_sb.slots[i]];
    if(tile.originalIdx !== i){ allCorrect = false; break; }
  }
  _sb.checked = true;
  _sb.resultKind = allCorrect ? 'ok' : 'no';
  // Persist to run history.
  if(!Array.isArray(state.sentenceBuilderRuns)) state.sentenceBuilderRuns = [];
  state.sentenceBuilderRuns.push({
    id:_sb.exercise.id,
    prompt:_sb.exercise.prompt,
    correct:allCorrect,
    hintLevel:_sb.hintLevel,
    when:Date.now(),
  });
  // Cap history at 50 entries.
  if(state.sentenceBuilderRuns.length > 50) state.sentenceBuilderRuns = state.sentenceBuilderRuns.slice(-50);
  save();
  renderBuilder();
  // Auto-fresh: kick off background generation so the next exercise
  // draws from a deeper pool. This runs only if the user has the
  // feature enabled and an API key.
  sbGenerateExerciseInBackground(_sb.level);
}

// Update sbScore so it counts BOTH curated and generated exercises.
// (The original version only looked at SB_EXERCISES, so generated runs
// weren't being credited.)
function sbScoreLevelAware(){
  const generated = state.sentenceBuilderGenerated || [];
  const allExercises = [...SB_EXERCISES, ...generated];
  const runs = (state.sentenceBuilderRuns || []).filter(r => {
    const ex = allExercises.find(e => e.id === r.id);
    return ex && ex.level === _sb.level;
  });
  return { ok: runs.filter(r => r.correct).length, total: runs.length };
}

// Compute the running score: correct-ratio for the current level over
// recent runs. Used in the toolbar chip. Delegates to the level-aware
// version which counts BOTH curated and generated exercises.
function sbScore(){
  return sbScoreLevelAware();
}

// ─── PANEL: SENTENCE BUILDER ────────────────────────────────────────────
function renderBuilder(){
  const el = document.getElementById('panel-builder');
  if(!el) return;
  // Auto-load an exercise on first render.
  if(!_sb.exercise) sbLoad(sbPick(_sb.level));
  const ex = _sb.exercise;
  const score = sbScore();

  const levelBtns = SB_LEVELS.map(L => `
    <button class="sb-pill ${_sb.level === L.id ? 'active' : ''}" onclick="sbSetLevel('${L.id}')">${esc(L.label)}</button>
  `).join('');

  const slotsHtml = _sb.slots.map((bankIdx, slotI) => {
    const correctTile = ex.sv[slotI];
    let cls = 'sb-slot';
    let inner;
    if(bankIdx == null){
      cls += ' empty';
      // Hint highlights — slot for verb (idx of first verb-color slot)
      const verbIdx = ex.sv.findIndex(s => s.color === 'verb');
      const subjIdx = ex.sv.findIndex(s => s.color === 'subject');
      if(_sb.hintLevel >= 1 && slotI === verbIdx) cls += ' hint';
      if(_sb.hintLevel >= 2 && slotI === subjIdx) cls += ' hint';
      inner = `<span class="sb-slot-empty-text">slot ${slotI + 1}</span>`;
    } else {
      cls += ' filled';
      const tile = _sb.bank[bankIdx];
      if(_sb.checked){
        if(tile.originalIdx === slotI) cls += ' correct';
        else cls += ' wrong';
      }
      inner = `<span class="sb-slot-word">${esc(tile.word)}</span>
               <span class="sb-slot-role">${esc(correctTile.role)}</span>`;
    }
    return `<div class="${cls}" onclick="sbReturn(${slotI})">
      <span class="sb-slot-num">slot ${slotI + 1}</span>
      ${inner}
    </div>`;
  }).join('');

  const bankHtml = _sb.bank.map((t, i) => `
    <button class="sb-tile ${t.used ? 'used' : ''}" onclick="sbPlace(${i})">${esc(t.word)}</button>
  `).join('');

  // Result panel content.
  let resultHtml = '';
  if(_sb.checked){
    if(_sb.resultKind === 'ok'){
      resultHtml = `
        <div class="sb-result show">
          <div class="sb-result-h">✓ Right!</div>
          <div class="sb-result-body">
            ${ex.hint ? `<p style="margin-bottom:8px">${ex.hint}</p>` : ''}
            <p>You got the V2 word order. The verb sits in slot ${ex.sv.findIndex(s => s.color === 'verb') + 1} ${ex.sv.findIndex(s => s.color === 'verb') !== 1 ? `<em>(unusual position!)</em>` : ''} — that's the heart of the rule.</p>
          </div>
        </div>
      `;
    } else {
      const correct = ex.sv.map(s => s.word).join(' ');
      resultHtml = `
        <div class="sb-result show is-wrong">
          <div class="sb-result-h">✗ Not quite</div>
          <div class="sb-result-body">
            <p>The correct order is:</p>
            <span class="sb-show-correct">${esc(correct)}</span>
            ${ex.hint ? `<p style="margin-top:10px">${ex.hint}</p>` : ''}
          </div>
        </div>
      `;
    }
  }

  // Recent run history.
  const runs = (state.sentenceBuilderRuns || []).slice(-8).reverse();
  const historyHtml = runs.length ? `
    <div class="sb-history">
      <div class="sb-history-h">Recent runs</div>
      ${runs.map(r => {
        const dt = new Date(r.when);
        const t = dt.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
        return `<div class="sb-history-row">
          <span class="sb-history-icon ${r.correct ? 'ok' : 'no'}">${r.correct ? '✓' : '✗'}</span>
          <span class="sb-history-prompt">${esc(r.prompt)}</span>
          <span class="sb-history-meta">${r.hintLevel ? 'hint·' + r.hintLevel + ' · ' : ''}${esc(t)}</span>
        </div>`;
      }).join('')}
    </div>
  ` : '';

  // Buttons row — labels depend on whether check has been clicked.
  const buttonsHtml = _sb.checked ? `
    <button class="btn btn-primary" onclick="sbNext()">Next sentence →</button>
    <button class="btn btn-ghost" onclick="sbReset()">Try this one again</button>
  ` : `
    <button class="btn btn-primary" onclick="sbCheck()">Check answer</button>
    <button class="btn btn-ghost" onclick="sbHint()">${
      _sb.hintLevel === 0 ? 'Hint' :
      _sb.hintLevel === 1 ? 'Another hint' :
      _sb.hintLevel === 2 ? 'Reveal answer' :
                           'Answer revealed'
    }</button>
    <button class="btn btn-ghost" onclick="sbReset()">Reset</button>
    <button class="btn btn-ghost" onclick="sbNext()" style="margin-left:auto">Skip →</button>
  `;

  el.innerHTML = `
    ${decorateBreadcrumb('builder')}
    <div class="ph">
      <div class="ph-tag">Meningar · V2 practice</div>
      <div class="ph-title">Sentence <em>Builder</em></div>
      <div class="ph-sub">Click word tiles to assemble the Swedish sentence in correct V2 order. The verb claims slot 2 — the rest follows. Three difficulty levels covering basic order, V2 inversion, and subordinate-clause traps.</div>
    </div>

    <div class="sb-toolbar">
      <div class="sb-tools-left">
        <div class="sb-pill-group">${levelBtns}</div>
      </div>
      <div class="sb-tools-right">
        <span class="sb-score-chip">${esc(_sb.level)} score: <strong>${score.ok}/${score.total}</strong></span>
      </div>
    </div>

    <div class="sb-card">
      <div class="sb-prompt-eyebrow">Translate to Swedish${ex.generated ? ` <span style="font-family:var(--ff-mono);font-size:9px;color:var(--gold);letter-spacing:0.06em;background:var(--gold-dim);padding:2px 7px;border-radius:4px;margin-left:6px">✦ AI-COMPOSED</span>` : ''}</div>
      <div class="sb-prompt">${esc(ex.prompt)}</div>
      ${ex.hint && _sb.hintLevel === 0 && !_sb.checked ? '' : ex.hint && (_sb.hintLevel >= 1 || _sb.checked) ? `<div class="sb-prompt-hint"><strong>note</strong>${ex.generated ? esc(ex.hint) : ex.hint}</div>` : ''}

      <div class="sb-target">
        <div class="sb-slots">${slotsHtml}</div>
      </div>

      <div class="sb-bank-label">Word bank</div>
      <div class="sb-bank">${bankHtml}</div>

      <div class="sb-actions">${buttonsHtml}</div>

      ${resultHtml}

      <div class="sb-legend">
        <span class="sb-legend-item"><span class="sb-legend-dot" style="background:rgba(58,122,217,0.4);border:1px solid var(--blue)"></span>Subject</span>
        <span class="sb-legend-item"><span class="sb-legend-dot" style="background:rgba(243,193,58,0.4);border:1px solid var(--gold)"></span>Verb</span>
        <span class="sb-legend-item"><span class="sb-legend-dot" style="background:rgba(58,212,182,0.3);border:1px solid var(--teal)"></span>Object</span>
        <span class="sb-legend-item"><span class="sb-legend-dot" style="background:rgba(160,124,240,0.3);border:1px solid var(--plum)"></span>Adverbial</span>
        <span class="sb-legend-item">click a placed tile to send it back</span>
      </div>
    </div>

    ${historyHtml}
  `;
}

  { term:'tack',         type:'phrase', short:'<strong>Thanks / please / yes please</strong>. The Swiss-army-knife word — alone it means "thank you", but also "yes" when offered something.', en:'Coffee? — Yes please.', sv:'Kaffe? — Tack.' },

  { term:'de / dom',     type:'pronoun', short:'<strong>They</strong>. Written as <em>de</em>, almost always pronounced <em>dom</em>. In casual writing you\'ll see <em>dom</em> directly. Object form: <em>dem</em> (also pronounced <em>dom</em>).', en:'They live in Lund.', sv:'De bor i Lund.' },
  { term:'man',          type:'pronoun', short:'<strong>One / you / people</strong> (impersonal). Like English "you can\'t do that" — refers to people in general. Vastly more common in Swedish than impersonal "one" is in English.', en:'You can\'t smoke here.', sv:'Man får inte röka här.' },
